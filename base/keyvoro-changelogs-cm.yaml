        <changeSet id="009-04-defaults" author="claude">
            <comment>Set defaults for timestamp columns on auth_verification table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="auth_verification" columnName="created_at" defaultValueComputed="NOW()"/>
            <addDefaultValue schemaName="keyvoro" tableName="auth_verification" columnName="updated_at" defaultValueComputed="NOW()"/>
