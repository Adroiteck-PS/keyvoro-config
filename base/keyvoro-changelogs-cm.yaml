    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!-- 019: Add LOS sync columns to integration table + webhook delivery log -->
    
        <!-- 019-01: Add LOS-specific columns to integration table -->
        <changeSet id="019-01" author="keyvoro">
            <addColumn tableName="integration">
                <column name="provider_instance_id" type="VARCHAR(200)">
                    <constraints nullable="true"/>
                </column>
                <column name="is_active" type="BOOLEAN" defaultValueBoolean="true">
                    <constraints nullable="false"/>
                </column>
                <column name="last_sync_status" type="VARCHAR(255)">
                    <constraints nullable="true"/>
                </column>
                <column name="last_sync_count" type="INTEGER">
                    <constraints nullable="true"/>
                </column>
            </addColumn>
        </changeSet>
    
        <!-- 019-02: Expand provider check constraint to include LOS providers -->
        <changeSet id="019-02" author="keyvoro">
            <sql>
                ALTER TABLE keyvoro.integration DROP CONSTRAINT IF EXISTS integration_provider_check;
                ALTER TABLE keyvoro.integration ADD CONSTRAINT integration_provider_check
                    CHECK (provider IN ('slack', 'zapier', 'make', 'n8n', 'custom', 'encompass', 'byte', 'calyx_point'));
            </sql>
        </changeSet>
    
        <!-- 019-03: Add los_reference_id and los_last_sync_at to loan table -->
        <changeSet id="019-03" author="keyvoro">
            <addColumn tableName="loan">
                <column name="los_reference_id" type="VARCHAR(200)">
                    <constraints nullable="true"/>
                </column>
                <column name="los_last_sync_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
            </addColumn>
        </changeSet>
    
        <!-- 019-04: Index on loan los_reference_id for sync lookups -->
        <changeSet id="019-04" author="keyvoro">
            <createIndex tableName="loan" indexName="idx_loan_los_reference">
                <column name="account_id"/>
                <column name="los_reference_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 019-05: Create webhook_delivery_log table (if not exists from earlier migration) -->
        <changeSet id="019-05" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><tableExists schemaName="keyvoro" tableName="webhook_delivery_log"/></not>
            </preConditions>
            <createTable tableName="webhook_delivery_log" remarks="Delivery log for outbound webhooks">
                <column name="id" type="UUID" defaultValueComputed="gen_random_uuid()">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="webhook_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_wdl_webhook" referencedTableName="webhook" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_wdl_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="event" type="VARCHAR(100)">
                    <constraints nullable="false"/>
                </column>
                <column name="payload" type="JSONB">
                    <constraints nullable="false"/>
                </column>
                <column name="status_code" type="INTEGER">
                    <constraints nullable="true"/>
                </column>
                <column name="response_body" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="attempt_number" type="INTEGER" defaultValueNumeric="1">
                    <constraints nullable="false"/>
                </column>
                <column name="next_retry_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="delivered_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="failed_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ" defaultValueComputed="CURRENT_TIMESTAMP">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <!-- 019-06: Indexes on webhook_delivery_log -->
        <changeSet id="019-06" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><indexExists indexName="idx_wdl_webhook"/></not>
            </preConditions>
            <createIndex tableName="webhook_delivery_log" indexName="idx_wdl_webhook">
                <column name="webhook_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 019-07: Add name and endpoint_url columns to webhook if missing (schema evolved) -->
        <changeSet id="019-07" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><columnExists schemaName="keyvoro" tableName="webhook" columnName="name"/></not>
            </preConditions>
            <addColumn tableName="webhook">
                <column name="name" type="VARCHAR(200)" defaultValue="Unnamed Webhook">
                    <constraints nullable="false"/>
                </column>
                <column name="description" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="endpoint_url" type="VARCHAR(2048)">
                    <constraints nullable="true"/>
                </column>
                <column name="status" type="VARCHAR(20)" defaultValue="active">
                    <constraints nullable="true"/>
                </column>
            </addColumn>
        </changeSet>
    
    </databaseChangeLog>
  020-lead-metadata-column.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!-- 020: Add metadata JSONB column to lead table for SMS opt-in/out tracking -->
    
        <changeSet id="020-01" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not>
                    <columnExists schemaName="keyvoro" tableName="lead" columnName="metadata"/>
                </not>
            </preConditions>
    
            <addColumn tableName="lead">
                <column name="metadata" type="JSONB">
                    <constraints nullable="true"/>
                </column>
            </addColumn>
        </changeSet>
    
    </databaseChangeLog>
