  010-loan-tables.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <changeSet id="010-01" author="claude">
            <comment>Create loan table for mortgage pipeline tracking</comment>
            <createTable schemaName="keyvoro" tableName="loan">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_loan_account" references="keyvoro.account(id)" deleteCascade="true"/>
                </column>
    
                <!-- Linked entities -->
                <column name="lead_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="deal_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Loan identifiers -->
                <column name="loan_number" type="VARCHAR(50)">
                    <constraints nullable="true"/>
                </column>
                <column name="los_reference_id" type="VARCHAR(100)">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Loan details -->
                <column name="loan_type" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="loan_amount" type="NUMERIC(12, 2)">
                    <constraints nullable="false"/>
                </column>
                <column name="purchase_price" type="NUMERIC(12, 2)">
                    <constraints nullable="true"/>
                </column>
                <column name="down_payment" type="NUMERIC(12, 2)">
                    <constraints nullable="true"/>
                </column>
                <column name="interest_rate" type="NUMERIC(5, 3)">
                    <constraints nullable="true"/>
                </column>
                <column name="loan_term" type="INTEGER">
                    <constraints nullable="true"/>
                </column>
                <column name="ltv" type="NUMERIC(5, 2)">
                    <constraints nullable="true"/>
                </column>
                <column name="dti" type="NUMERIC(5, 2)">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Property info -->
                <column name="property_address" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="property_city" type="VARCHAR(100)">
                    <constraints nullable="true"/>
                </column>
                <column name="property_state" type="VARCHAR(50)">
                    <constraints nullable="true"/>
                </column>
                <column name="property_zip" type="VARCHAR(20)">
                    <constraints nullable="true"/>
                </column>
                <column name="property_type" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="is_refinance" type="BOOLEAN" defaultValueBoolean="false">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Borrower info -->
                <column name="borrower_first_name" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="borrower_last_name" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="borrower_email" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="borrower_phone" type="VARCHAR(20)">
                    <constraints nullable="true"/>
                </column>
                <column name="co_borrower_name" type="TEXT">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Status & milestone -->
                <column name="status" type="TEXT" defaultValue="pre_qualification">
                    <constraints nullable="false"/>
                </column>
                <column name="current_milestone" type="TEXT" defaultValue="pre_qualification">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Dates -->
                <column name="application_date" type="DATE">
                    <constraints nullable="true"/>
                </column>
                <column name="estimated_close_date" type="DATE">
                    <constraints nullable="true"/>
                </column>
                <column name="actual_close_date" type="DATE">
                    <constraints nullable="true"/>
                </column>
                <column name="lock_expiration_date" type="DATE">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Ownership -->
                <column name="loan_officer_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="processor_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
    
                <!-- Flexible fields -->
                <column name="notes" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="tags" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="custom_fields" type="JSONB">
                    <constraints nullable="true"/>
                </column>
    
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="010-01-defaults" author="claude">
            <comment>Set defaults for timestamp columns on loan table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="loan" columnName="created_at" defaultValueComputed="NOW()"/>
            <addDefaultValue schemaName="keyvoro" tableName="loan" columnName="updated_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="010-02" author="claude">
            <comment>Add foreign keys for loan linked entities and ownership</comment>
            <addForeignKeyConstraint constraintName="fk_loan_lead"
                baseTableSchemaName="keyvoro" baseTableName="loan" baseColumnNames="lead_id"
                referencedTableSchemaName="keyvoro" referencedTableName="lead" referencedColumnNames="id"
                onDelete="SET NULL"/>
            <addForeignKeyConstraint constraintName="fk_loan_deal"
                baseTableSchemaName="keyvoro" baseTableName="loan" baseColumnNames="deal_id"
                referencedTableSchemaName="keyvoro" referencedTableName="deal" referencedColumnNames="id"
                onDelete="SET NULL"/>
            <addForeignKeyConstraint constraintName="fk_loan_officer"
                baseTableSchemaName="keyvoro" baseTableName="loan" baseColumnNames="loan_officer_id"
                referencedTableSchemaName="keyvoro" referencedTableName="users" referencedColumnNames="id"
                onDelete="SET NULL"/>
            <addForeignKeyConstraint constraintName="fk_loan_processor"
                baseTableSchemaName="keyvoro" baseTableName="loan" baseColumnNames="processor_id"
                referencedTableSchemaName="keyvoro" referencedTableName="users" referencedColumnNames="id"
                onDelete="SET NULL"/>
        </changeSet>
    
        <changeSet id="010-03" author="claude">
            <comment>Create loan_milestone table for tracking loan stage completions</comment>
            <createTable schemaName="keyvoro" tableName="loan_milestone">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="loan_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_milestone_loan" references="keyvoro.loan(id)" deleteCascade="true"/>
                </column>
                <column name="milestone" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="status" type="TEXT" defaultValue="pending">
                    <constraints nullable="false"/>
                </column>
                <column name="completed_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="completed_by_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="due_date" type="DATE">
                    <constraints nullable="true"/>
                </column>
                <column name="notes" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="metadata" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="010-03-defaults" author="claude">
            <comment>Set defaults for timestamp columns on loan_milestone table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="loan_milestone" columnName="created_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="010-04" author="claude">
            <comment>Add foreign key for milestone completed_by</comment>
            <addForeignKeyConstraint constraintName="fk_milestone_completed_by"
                baseTableSchemaName="keyvoro" baseTableName="loan_milestone" baseColumnNames="completed_by_id"
                referencedTableSchemaName="keyvoro" referencedTableName="users" referencedColumnNames="id"
                onDelete="SET NULL"/>
        </changeSet>
    
        <changeSet id="010-05" author="claude">
            <comment>Create indexes on loan and loan_milestone tables</comment>
            <createIndex schemaName="keyvoro" tableName="loan" indexName="idx_loan_account_id">
                <column name="account_id"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="loan" indexName="idx_loan_lead_id">
                <column name="lead_id"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="loan" indexName="idx_loan_status">
                <column name="status"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="loan" indexName="idx_loan_officer_id">
                <column name="loan_officer_id"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="loan" indexName="idx_loan_number">
                <column name="loan_number"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="loan_milestone" indexName="idx_loan_milestone_loan_id">
                <column name="loan_id"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="loan_milestone" indexName="idx_loan_milestone_milestone">
                <column name="milestone"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="010-06" author="claude">
            <comment>Enable RLS on loan and loan_milestone tables</comment>
            <sql>
                ALTER TABLE keyvoro.loan ENABLE ROW LEVEL SECURITY;
                DROP POLICY IF EXISTS rls_loan_isolation ON keyvoro.loan;
                CREATE POLICY rls_loan_isolation ON keyvoro.loan
                    USING (account_id = current_setting('app.current_account_id', true)::uuid)
                    WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);
    
                ALTER TABLE keyvoro.loan_milestone ENABLE ROW LEVEL SECURITY;
                DROP POLICY IF EXISTS rls_loan_milestone_isolation ON keyvoro.loan_milestone;
                CREATE POLICY rls_loan_milestone_isolation ON keyvoro.loan_milestone
                    USING (loan_id IN (SELECT id FROM keyvoro.loan WHERE account_id = current_setting('app.current_account_id', true)::uuid))
                    WITH CHECK (loan_id IN (SELECT id FROM keyvoro.loan WHERE account_id = current_setting('app.current_account_id', true)::uuid));
            </sql>
        </changeSet>
    
    </databaseChangeLog>
