apiVersion: v1
data:
  001-organization-and-users.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n        https://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.29.xsd\">\n\n    <changeSet id=\"001-01\" author=\"cesar\">\n        <comment>Create account table (renamed from organization)</comment>\n        <createTable tableName=\"account\">\n            <column name=\"id\" type=\"UUID\" defaultValueComputed=\"gen_random_uuid()\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"name\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"domain\" type=\"TEXT\">\n                <constraints nullable=\"false\" unique=\"true\"/>\n            </column>\n            <column name=\"plan_type\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"status\" type=\"TEXT\" defaultValue=\"active\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"stripe_customer_id\" type=\"TEXT\"/>\n            <column name=\"stripe_subscription_id\" type=\"TEXT\"/>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\" defaultValueComputed=\"now()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\" defaultValueComputed=\"now()\">\n                <constraints nullable=\"false\"/>\n            </column>\n        </createTable>\n        <createIndex tableName=\"account\" indexName=\"idx_account_domain\">\n            <column name=\"domain\"/>\n        </createIndex>\n        <createIndex tableName=\"account\" indexName=\"idx_account_created\">\n            <column name=\"created_at\"/>\n        </createIndex>\n    </changeSet>\n\n    <changeSet id=\"001-02\" author=\"cesar\">\n        <comment>Create users table (renamed from res_user)</comment>\n        <createTable tableName=\"users\">\n            <column name=\"id\" type=\"UUID\" defaultValueComputed=\"gen_random_uuid()\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_users_account\" references=\"keyvoro.account(id)\"/>\n            </column>\n            <column name=\"email\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"name\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"avatar_url\" type=\"TEXT\"/>\n            <column name=\"role\" type=\"TEXT\" defaultValue=\"member\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"auth_provider\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"auth_id\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"phone\" type=\"TEXT\"/>\n            <column name=\"last_login_at\" type=\"TIMESTAMPTZ\"/>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\" defaultValueComputed=\"now()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\" defaultValueComputed=\"now()\">\n                <constraints nullable=\"false\"/>\n            </column>\n        </createTable>\n        <createIndex tableName=\"users\" indexName=\"idx_users_account_id\">\n            <column name=\"account_id\"/>\n        </createIndex>\n        <createIndex tableName=\"users\" indexName=\"idx_users_email\">\n            <column name=\"email\"/>\n        </createIndex>\n        <createIndex tableName=\"users\" indexName=\"idx_users_auth_provider_id\">\n            <column name=\"auth_provider\"/>\n            <column name=\"auth_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <changeSet id=\"001-03\" author=\"cesar\">\n        <comment>Enable Row Level Security for account table</comment>\n        <sql>\n            ALTER TABLE keyvoro.account ENABLE ROW LEVEL SECURITY;\n            \n            CREATE POLICY rls_account_isolation ON keyvoro.account\n                FOR ALL\n                USING (id = current_setting('app.current_account_id', true)::uuid);\n        </sql>\n    </changeSet>\n\n    <changeSet id=\"001-04\" author=\"cesar\">\n        <comment>Enable Row Level Security for users table</comment>\n        <sql>\n            ALTER TABLE keyvoro.users ENABLE ROW LEVEL SECURITY;\n            \n            CREATE POLICY rls_users_isolation ON keyvoro.users\n                FOR ALL\n                USING (account_id = current_setting('app.current_account_id', true)::uuid);\n        </sql>\n    </changeSet>\n\n</databaseChangeLog>\n"
  002-contacts.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n    http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.0.xsd\">\n\n    <changeSet id=\"002-01\" author=\"claude\">\n        <comment>Create lead table (renamed from contact)</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"lead\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_lead_account\" references=\"keyvoro.account(id)\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"first_name\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"last_name\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"email\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"phone\" type=\"VARCHAR(20)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"company\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"address\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"city\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"state\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"zip_code\" type=\"VARCHAR(20)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"country\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"ai_notes\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"deal_value\" type=\"NUMERIC(12, 2)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"estimated_close_date\" type=\"DATE\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"source\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"status\" type=\"VARCHAR(50)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"tags\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"custom_fields\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_by_id\" type=\"UUID\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"002-01b\" author=\"claude\">\n        <comment>Add SET NULL foreign key for created_by_id on lead table</comment>\n        <addForeignKeyConstraint constraintName=\"fk_lead_created_by\"\n            baseTableSchemaName=\"keyvoro\" baseTableName=\"lead\" baseColumnNames=\"created_by_id\"\n            referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n            onDelete=\"SET NULL\"/>\n    </changeSet>\n\n    <changeSet id=\"002-02\" author=\"claude\">\n        <comment>Create indexes on lead table</comment>\n        <createIndex schemaName=\"keyvoro\" tableName=\"lead\" indexName=\"idx_lead_account_id\">\n            <column name=\"account_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"lead\" indexName=\"idx_lead_email\">\n            <column name=\"email\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"lead\" indexName=\"idx_lead_status\">\n            <column name=\"status\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"lead\" indexName=\"idx_lead_created_at\">\n            <column name=\"created_at\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"lead\" indexName=\"idx_lead_tags\">\n            <column name=\"tags\"/>\n            <where>tags IS NOT NULL</where>\n        </createIndex>\n    </changeSet>\n\n    <changeSet id=\"002-03\" author=\"claude\">\n        <comment>Enable RLS on lead table</comment>\n        <sql>\n            ALTER TABLE keyvoro.lead ENABLE ROW LEVEL SECURITY;\n            DROP POLICY IF EXISTS rls_lead_isolation ON keyvoro.lead;\n            CREATE POLICY rls_lead_isolation ON keyvoro.lead\n                USING (account_id = current_setting('app.current_account_id', true)::uuid)\n                WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n        </sql>\n    </changeSet>\n\n</databaseChangeLog>"
  003-pipeline-and-deals.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n    http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.0.xsd\">\n\n    <changeSet id=\"003-01\" author=\"claude\">\n        <comment>Create pipeline table</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"pipeline\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_pipeline_account\" references=\"keyvoro.account(id)\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"name\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"description\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"color\" type=\"VARCHAR(7)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"is_default\" type=\"BOOLEAN\">\n                <constraints nullable=\"false\"/>\n                <defaultValue>false</defaultValue>\n            </column>\n            <column name=\"display_order\" type=\"INTEGER\">\n                <constraints nullable=\"false\"/>\n                <defaultValue>0</defaultValue>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"003-02\" author=\"claude\">\n        <comment>Create pipeline_stage table</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"pipeline_stage\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"pipeline_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_stage_pipeline\" references=\"keyvoro.pipeline(id)\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"name\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"description\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"probability\" type=\"NUMERIC(3, 0)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"display_order\" type=\"INTEGER\">\n                <constraints nullable=\"false\"/>\n                <defaultValue>0</defaultValue>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"003-03\" author=\"claude\">\n        <comment>Create deal table</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"deal\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_deal_account\" references=\"keyvoro.account(id)\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"pipeline_stage_id\" type=\"UUID\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"title\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"description\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"amount\" type=\"NUMERIC(12, 2)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"currency\" type=\"VARCHAR(3)\">\n                <constraints nullable=\"false\"/>\n                <defaultValue>USD</defaultValue>\n            </column>\n            <column name=\"expected_close_date\" type=\"DATE\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"closed_date\" type=\"DATE\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"closed_won\" type=\"BOOLEAN\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"owner_id\" type=\"UUID\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"priority\" type=\"VARCHAR(50)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"source\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"tags\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"custom_fields\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_by_id\" type=\"UUID\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"003-03b\" author=\"claude\">\n        <comment>Add RESTRICT and SET NULL foreign keys for deal table</comment>\n        <addForeignKeyConstraint constraintName=\"fk_deal_stage\"\n            baseTableSchemaName=\"keyvoro\" baseTableName=\"deal\" baseColumnNames=\"pipeline_stage_id\"\n            referencedTableSchemaName=\"keyvoro\" referencedTableName=\"pipeline_stage\" referencedColumnNames=\"id\"\n            onDelete=\"RESTRICT\"/>\n        <addForeignKeyConstraint constraintName=\"fk_deal_owner\"\n            baseTableSchemaName=\"keyvoro\" baseTableName=\"deal\" baseColumnNames=\"owner_id\"\n            referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n            onDelete=\"SET NULL\"/>\n        <addForeignKeyConstraint constraintName=\"fk_deal_created_by\"\n            baseTableSchemaName=\"keyvoro\" baseTableName=\"deal\" baseColumnNames=\"created_by_id\"\n            referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n            onDelete=\"SET NULL\"/>\n    </changeSet>\n\n    <changeSet id=\"003-04\" author=\"claude\">\n        <comment>Create deal_lead junction table (renamed from deal_contact)</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"deal_lead\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"deal_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_deal_lead_deal\" references=\"keyvoro.deal(id)\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"lead_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_deal_lead_lead\" references=\"keyvoro.lead(id)\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"role\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"is_primary\" type=\"BOOLEAN\">\n                <constraints nullable=\"false\"/>\n                <defaultValue>false</defaultValue>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\"/>\n                <defaultValueComputed>NOW()</defaultValueComputed>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"003-05\" author=\"claude\">\n        <comment>Create indexes on pipeline and deal tables</comment>\n        <createIndex schemaName=\"keyvoro\" tableName=\"pipeline\" indexName=\"idx_pipeline_account_id\">\n            <column name=\"account_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"pipeline\" indexName=\"idx_pipeline_is_default\">\n            <column name=\"is_default\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"pipeline_stage\" indexName=\"idx_stage_pipeline_id\">\n            <column name=\"pipeline_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal\" indexName=\"idx_deal_account_id\">\n            <column name=\"account_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal\" indexName=\"idx_deal_stage_id\">\n            <column name=\"pipeline_stage_id\"\
    />\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal\" indexName=\"idx_deal_owner_id\">\n            <column name=\"owner_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal\" indexName=\"idx_deal_expected_close_date\">\n            <column name=\"expected_close_date\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal\" indexName=\"idx_deal_closed_won\">\n            <column name=\"closed_won\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal_lead\" indexName=\"idx_deal_lead_deal_id\">\n            <column name=\"deal_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal_lead\" indexName=\"idx_deal_lead_lead_id\">\n            <column name=\"lead_id\"/>\n        </createIndex>\n        <createIndex schemaName=\"keyvoro\" tableName=\"deal_lead\" indexName=\"uq_deal_lead\">\n            <column name=\"deal_id\"/>\n            <column name=\"lead_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <changeSet id=\"003-06\" author=\"claude\">\n        <comment>Enable RLS on pipeline, pipeline_stage, deal, and deal_lead tables</comment>\n        <sql>\n            ALTER TABLE keyvoro.pipeline ENABLE ROW LEVEL SECURITY;\n            DROP POLICY IF EXISTS rls_pipeline_isolation ON keyvoro.pipeline;\n            CREATE POLICY rls_pipeline_isolation ON keyvoro.pipeline\n                USING (account_id = current_setting('app.current_account_id', true)::uuid)\n                WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n\n            ALTER TABLE keyvoro.pipeline_stage ENABLE ROW LEVEL SECURITY;\n            DROP POLICY IF EXISTS rls_pipeline_stage_isolation ON keyvoro.pipeline_stage;\n            CREATE POLICY rls_pipeline_stage_isolation ON keyvoro.pipeline_stage\n                USING (pipeline_id IN (SELECT id FROM keyvoro.pipeline WHERE account_id = current_setting('app.current_account_id', true)::uuid))\n                WITH CHECK (pipeline_id IN (SELECT id FROM keyvoro.pipeline WHERE account_id = current_setting('app.current_account_id', true)::uuid));\n\n            ALTER TABLE keyvoro.deal ENABLE ROW LEVEL SECURITY;\n            DROP POLICY IF EXISTS rls_deal_isolation ON keyvoro.deal;\n            CREATE POLICY rls_deal_isolation ON keyvoro.deal\n                USING (account_id = current_setting('app.current_account_id', true)::uuid)\n                WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n\n            ALTER TABLE keyvoro.deal_lead ENABLE ROW LEVEL SECURITY;\n            DROP POLICY IF EXISTS rls_deal_lead_isolation ON keyvoro.deal_lead;\n            CREATE POLICY rls_deal_lead_isolation ON keyvoro.deal_lead\n                USING (deal_id IN (SELECT id FROM keyvoro.deal WHERE account_id = current_setting('app.current_account_id', true)::uuid))\n                WITH CHECK (deal_id IN (SELECT id FROM keyvoro.deal WHERE account_id = current_setting('app.current_account_id', true)::uuid));\n        </sql>\n    </changeSet>\n\n</databaseChangeLog>"
  004-activities-and-tasks.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n                   xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n                   xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n                   http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.27.xsd\">\n\n  <changeSet id=\"004-01\" author=\"Keyvoro\">\n    <comment>Create activity table for tracking interactions and events</comment>\n    <createTable tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"id\" type=\"uuid\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      <column name=\"account_id\" type=\"uuid\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_activity_account\" \n                     references=\"keyvoro.account(id)\" deleteCascade=\"true\"/>\n      </column>\n      <column name=\"lead_id\" type=\"uuid\">\n        <constraints nullable=\"true\" foreignKeyName=\"fk_activity_lead\" \n                     references=\"keyvoro.lead(id)\" deleteCascade=\"true\"/>\n      </column>\n      <column name=\"deal_id\" type=\"uuid\">\n        <constraints nullable=\"true\" foreignKeyName=\"fk_activity_deal\" \n                     references=\"keyvoro.deal(id)\" deleteCascade=\"true\"/>\n      </column>\n      <column name=\"activity_type\" type=\"varchar(50)\">\n        <constraints nullable=\"false\" checkConstraint=\"activity_type IN ('call', 'email', 'meeting', 'note', 'task', 'ai_generated')\"/>\n      </column>\n      <column name=\"subject\" type=\"varchar(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"description\" type=\"text\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"status\" type=\"varchar(50)\" defaultValue=\"open\">\n        <constraints nullable=\"false\" checkConstraint=\"status IN ('open', 'in_progress', 'completed', 'cancelled')\"/>\n      </column>\n      <column name=\"priority\" type=\"varchar(50)\" defaultValue=\"medium\">\n        <constraints nullable=\"false\" checkConstraint=\"priority IN ('low', 'medium', 'high', 'urgent')\"/>\n      </column>\n      <column name=\"assigned_to_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"due_date\" type=\"date\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"completed_at\" type=\"timestamptz\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"metadata\" type=\"jsonb\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"ai_insights\" type=\"text\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"created_by_id\" type=\"uuid\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"created_at\" type=\"timestamptz\" defaultValueComputed=\"CURRENT_TIMESTAMP\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"updated_at\" type=\"timestamptz\" defaultValueComputed=\"CURRENT_TIMESTAMP\">\n        <constraints nullable=\"false\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <changeSet id=\"004-01b\" author=\"Keyvoro\">\n    <comment>Add SET NULL foreign keys for activity table</comment>\n    <addForeignKeyConstraint constraintName=\"fk_activity_assigned_user\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"activity\" baseColumnNames=\"assigned_to_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n    <addForeignKeyConstraint constraintName=\"fk_activity_created_user\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"activity\" baseColumnNames=\"created_by_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <changeSet id=\"004-02\" author=\"Keyvoro\">\n    <comment>Create task table for explicit task management</comment>\n    <createTable tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"id\" type=\"uuid\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      <column name=\"account_id\" type=\"uuid\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_task_account\" \n                     references=\"keyvoro.account(id)\" deleteCascade=\"true\"/>\n      </column>\n      <column name=\"activity_id\" type=\"uuid\">\n        <constraints nullable=\"true\" foreignKeyName=\"fk_task_activity\" \n                     references=\"keyvoro.activity(id)\" deleteCascade=\"true\"/>\n      </column>\n      <column name=\"title\" type=\"varchar(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"description\" type=\"text\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"status\" type=\"varchar(50)\" defaultValue=\"todo\">\n        <constraints nullable=\"false\" checkConstraint=\"status IN ('todo', 'in_progress', 'review', 'done', 'cancelled')\"/>\n      </column>\n      <column name=\"priority\" type=\"varchar(50)\" defaultValue=\"medium\">\n        <constraints nullable=\"false\" checkConstraint=\"priority IN ('low', 'medium', 'high', 'urgent')\"/>\n      </column>\n      <column name=\"assigned_to_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"due_date\" type=\"date\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"start_date\" type=\"date\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"completed_at\" type=\"timestamptz\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"estimated_hours\" type=\"numeric(5,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"actual_hours\" type=\"numeric(5,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"tags\" type=\"jsonb\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"created_by_id\" type=\"uuid\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"created_at\" type=\"timestamptz\" defaultValueComputed=\"CURRENT_TIMESTAMP\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"updated_at\" type=\"timestamptz\" defaultValueComputed=\"CURRENT_TIMESTAMP\">\n        <constraints nullable=\"false\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <changeSet id=\"004-02b\" author=\"Keyvoro\">\n    <comment>Add SET NULL foreign keys for task table</comment>\n    <addForeignKeyConstraint constraintName=\"fk_task_assigned_user\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"task\" baseColumnNames=\"assigned_to_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n    <addForeignKeyConstraint constraintName=\"fk_task_created_user\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"task\" baseColumnNames=\"created_by_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <changeSet id=\"004-03\" author=\"Keyvoro\">\n    <comment>Create indexes on activity table</comment>\n    <createIndex indexName=\"idx_activity_account_id\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_lead_id\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"lead_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_deal_id\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"deal_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_assigned_to_id\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"assigned_to_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_status\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"status\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_type\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"activity_type\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_due_date\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"due_date\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_activity_created_at\" tableName=\"activity\" schemaName=\"keyvoro\">\n      <column name=\"created_at\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"004-04\" author=\"Keyvoro\">\n    <comment>Create indexes on task table</comment>\n    <createIndex indexName=\"idx_task_account_id\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_task_activity_id\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"activity_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_task_assigned_to_id\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"assigned_to_id\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_task_status\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"status\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_task_due_date\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"due_date\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_task_priority\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"priority\"/>\n    </createIndex>\n    <createIndex indexName=\"idx_task_created_at\" tableName=\"task\" schemaName=\"keyvoro\">\n      <column name=\"created_at\"/>\n    </createIndex>\n\
    \  </changeSet>\n\n  <changeSet id=\"004-05\" author=\"Keyvoro\">\n    <comment>Enable RLS on activity table</comment>\n    <sql>\n      ALTER TABLE keyvoro.activity ENABLE ROW LEVEL SECURITY;\n      \n      CREATE POLICY activity_isolate_by_account ON keyvoro.activity\n        FOR ALL\n        USING (account_id = current_setting('app.current_account_id', true)::uuid)\n        WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n    </sql>\n  </changeSet>\n\n  <changeSet id=\"004-06\" author=\"Keyvoro\">\n    <comment>Enable RLS on task table</comment>\n    <sql>\n      ALTER TABLE keyvoro.task ENABLE ROW LEVEL SECURITY;\n      \n      CREATE POLICY task_isolate_by_account ON keyvoro.task\n        FOR ALL\n        USING (account_id = current_setting('app.current_account_id', true)::uuid)\n        WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n    </sql>\n  </changeSet>\n\n</databaseChangeLog>\n"
  005-documents.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n  xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n  http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.24.xsd\">\n\n  <!-- ============================================================================\n       005-documents.xml\n       Purpose: Create document storage and management tables with multi-tenant RLS\n       Tables: document\n       Renames: organization→account, contact→lead, res_user→users\n       ============================================================================ -->\n\n  <!-- ============================================================================\n       CHANGESET 005-01: Create document table\n       ============================================================================ -->\n  <changeSet id=\"005-01\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <not>\n        <tableExists schemaName=\"keyvoro\" tableName=\"document\"/>\n      </not>\n    </preConditions>\n    \n    <createTable schemaName=\"keyvoro\" tableName=\"document\">\n      <column name=\"id\" type=\"UUID\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      \n      <column name=\"account_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_document_account_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"account\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"lead_id\" type=\"UUID\">\n        <constraints nullable=\"true\" foreignKeyName=\"fk_document_lead_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"lead\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"title\" type=\"VARCHAR(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"description\" type=\"TEXT\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"document_type\" type=\"VARCHAR(50)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"file_path\" type=\"VARCHAR(512)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"file_size\" type=\"BIGINT\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"file_mime_type\" type=\"VARCHAR(100)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"is_public\" type=\"BOOLEAN\" defaultValueBoolean=\"false\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"tags\" type=\"JSONB\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_by_id\" type=\"UUID\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n      \n      <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 005-01b: Add SET NULL foreign key for document.created_by_id\n       ============================================================================ -->\n  <changeSet id=\"005-01b\" author=\"keyvoro\">\n    <comment>Add SET NULL foreign key for document.created_by_id</comment>\n    <addForeignKeyConstraint constraintName=\"fk_document_created_by_id\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"document\" baseColumnNames=\"created_by_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 005-02: Create indexes on document table\n       ============================================================================ -->\n  <changeSet id=\"005-02\" author=\"keyvoro\">\n    <createIndex schemaName=\"keyvoro\" tableName=\"document\" indexName=\"idx_document_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"document\" indexName=\"idx_document_lead_id\">\n      <column name=\"lead_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"document\" indexName=\"idx_document_document_type\">\n      <column name=\"document_type\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"document\" indexName=\"idx_document_is_public\">\n      <column name=\"is_public\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"document\" indexName=\"idx_document_created_by_id\">\n      <column name=\"created_by_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"document\" indexName=\"idx_document_created_at\">\n      <column name=\"created_at\" descending=\"true\"/>\n    </createIndex>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 005-03: Enable RLS on document table\n       ============================================================================ -->\n  <changeSet id=\"005-03\" author=\"keyvoro\">\n    <sql>\n      ALTER TABLE keyvoro.document ENABLE ROW LEVEL SECURITY;\n    </sql>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 005-04: Create RLS policy for document isolation by account\n       ============================================================================ -->\n  <changeSet id=\"005-04\" author=\"keyvoro\">\n    <sql>\n      CREATE POLICY document_account_isolation ON keyvoro.document\n        USING (account_id = (current_setting('app.current_account_id', true)::uuid))\n        WITH CHECK (account_id = (current_setting('app.current_account_id', true)::uuid));\n    </sql>\n  </changeSet>\n\n</databaseChangeLog>\n"
  006-marketing.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n  xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n  xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n  http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.24.xsd\">\n\n  <!-- ============================================================================\n       006-marketing.xml\n       Purpose: Create marketing automation tables with multi-tenant RLS\n       Tables: email_template, campaign, campaign_step, campaign_recipient\n       Renames: organization→account, contact→lead, res_user→users\n       ============================================================================ -->\n\n  <!-- ============================================================================\n       CHANGESET 006-01: Create email_template table\n       ============================================================================ -->\n  <changeSet id=\"006-01\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <not>\n        <tableExists schemaName=\"keyvoro\" tableName=\"email_template\"/>\n      </not>\n    </preConditions>\n    \n    <createTable schemaName=\"keyvoro\" tableName=\"email_template\">\n      <column name=\"id\" type=\"UUID\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      \n      <column name=\"account_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_email_template_account_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"account\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"name\" type=\"VARCHAR(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"subject\" type=\"VARCHAR(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"body\" type=\"TEXT\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"html_body\" type=\"TEXT\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"variables\" type=\"JSONB\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_by_id\" type=\"UUID\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n      \n      <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-01b: Add SET NULL FK for email_template.created_by_id\n       ============================================================================ -->\n  <changeSet id=\"006-01b\" author=\"keyvoro\">\n    <addForeignKeyConstraint constraintName=\"fk_email_template_created_by_id\"\n      baseTableSchemaName=\"keyvoro\" baseTableName=\"email_template\" baseColumnNames=\"created_by_id\"\n      referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n      onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-02: Create campaign table\n       ============================================================================ -->\n  <changeSet id=\"006-02\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <not>\n        <tableExists schemaName=\"keyvoro\" tableName=\"campaign\"/>\n      </not>\n    </preConditions>\n    \n    <createTable schemaName=\"keyvoro\" tableName=\"campaign\">\n      <column name=\"id\" type=\"UUID\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      \n      <column name=\"account_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_campaign_account_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"account\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"name\" type=\"VARCHAR(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"description\" type=\"TEXT\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"status\" type=\"VARCHAR(50)\">\n        <constraints nullable=\"false\" checkConstraint=\"status IN ('draft', 'active', 'paused', 'completed', 'archived')\"/>\n      </column>\n      \n      <column name=\"campaign_type\" type=\"VARCHAR(50)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"start_date\" type=\"DATE\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"end_date\" type=\"DATE\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"total_recipients\" type=\"INTEGER\" defaultValue=\"0\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"sent_count\" type=\"INTEGER\" defaultValue=\"0\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"opened_count\" type=\"INTEGER\" defaultValue=\"0\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"clicked_count\" type=\"INTEGER\" defaultValue=\"0\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"bounced_count\" type=\"INTEGER\" defaultValue=\"0\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"metadata\" type=\"JSONB\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_by_id\" type=\"UUID\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n      \n      <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-02b: Add SET NULL FK for campaign.created_by_id\n       ============================================================================ -->\n  <changeSet id=\"006-02b\" author=\"keyvoro\">\n    <addForeignKeyConstraint constraintName=\"fk_campaign_created_by_id\"\n      baseTableSchemaName=\"keyvoro\" baseTableName=\"campaign\" baseColumnNames=\"created_by_id\"\n      referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n      onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-03: Create campaign_step table\n       ============================================================================ -->\n  <changeSet id=\"006-03\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <not>\n        <tableExists schemaName=\"keyvoro\" tableName=\"campaign_step\"/>\n      </not>\n    </preConditions>\n    \n    <createTable schemaName=\"keyvoro\" tableName=\"campaign_step\">\n      <column name=\"id\" type=\"UUID\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      \n      <column name=\"account_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_campaign_step_account_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"account\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"campaign_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_campaign_step_campaign_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"campaign\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"step_number\" type=\"INTEGER\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"email_template_id\" type=\"UUID\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"delay_days\" type=\"INTEGER\" defaultValue=\"0\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"condition_type\" type=\"VARCHAR(50)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"condition_value\" type=\"TEXT\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"metadata\" type=\"JSONB\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n      \n      <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-03b: Add SET NULL foreign key constraint for email_template_id\n       ============================================================================ -->\n  <changeSet id=\"006-03b\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <columnExists schemaName=\"keyvoro\" tableName=\"campaign_step\" columnName=\"email_template_id\"/>\n      <not>\n        <foreignKeyConstraintExists schemaName=\"\
    keyvoro\" foreignKeyName=\"fk_campaign_step_email_template_id_on_delete\"/>\n      </not>\n    </preConditions>\n    \n    <addForeignKeyConstraint baseTableSchemaName=\"keyvoro\" baseTableName=\"campaign_step\"\n      baseColumnNames=\"email_template_id\" referencedTableSchemaName=\"keyvoro\"\n      referencedTableName=\"email_template\" referencedColumnNames=\"id\"\n      constraintName=\"fk_campaign_step_email_template_id\"\n      onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-04: Create campaign_recipient table\n       ============================================================================ -->\n  <changeSet id=\"006-04\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <not>\n        <tableExists schemaName=\"keyvoro\" tableName=\"campaign_recipient\"/>\n      </not>\n    </preConditions>\n    \n    <createTable schemaName=\"keyvoro\" tableName=\"campaign_recipient\">\n      <column name=\"id\" type=\"UUID\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      \n      <column name=\"account_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_campaign_recipient_account_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"account\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"campaign_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_campaign_recipient_campaign_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"campaign\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"lead_id\" type=\"UUID\">\n        <constraints nullable=\"false\" foreignKeyName=\"fk_campaign_recipient_lead_id\"\n          referencedTableSchemaName=\"keyvoro\" referencedTableName=\"lead\"\n          referencedColumnName=\"id\" deleteCascade=\"true\"/>\n      </column>\n      \n      <column name=\"email_address\" type=\"VARCHAR(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      \n      <column name=\"status\" type=\"VARCHAR(50)\">\n        <constraints nullable=\"false\" checkConstraint=\"status IN ('pending', 'sent', 'opened', 'clicked', 'bounced', 'unsubscribed', 'failed')\"/>\n      </column>\n      \n      <column name=\"opened_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"clicked_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"bounced_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"unsubscribed_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"last_sent_step_id\" type=\"UUID\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"metadata\" type=\"JSONB\">\n        <constraints nullable=\"true\"/>\n      </column>\n      \n      <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n      \n      <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n        <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-04b: Add SET NULL foreign key constraint for last_sent_step_id\n       ============================================================================ -->\n  <changeSet id=\"006-04b\" author=\"keyvoro\">\n    <preConditions onFail=\"MARK_RAN\">\n      <columnExists schemaName=\"keyvoro\" tableName=\"campaign_recipient\" columnName=\"last_sent_step_id\"/>\n      <not>\n        <foreignKeyConstraintExists schemaName=\"keyvoro\" foreignKeyName=\"fk_campaign_recipient_last_sent_step_id_on_delete\"/>\n      </not>\n    </preConditions>\n    \n    <addForeignKeyConstraint baseTableSchemaName=\"keyvoro\" baseTableName=\"campaign_recipient\"\n      baseColumnNames=\"last_sent_step_id\" referencedTableSchemaName=\"keyvoro\"\n      referencedTableName=\"campaign_step\" referencedColumnNames=\"id\"\n      constraintName=\"fk_campaign_recipient_last_sent_step_id\"\n      onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-05: Create indexes on email_template table\n       ============================================================================ -->\n  <changeSet id=\"006-05\" author=\"keyvoro\">\n    <createIndex schemaName=\"keyvoro\" tableName=\"email_template\" indexName=\"idx_email_template_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"email_template\" indexName=\"idx_email_template_created_by_id\">\n      <column name=\"created_by_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"email_template\" indexName=\"idx_email_template_created_at\">\n      <column name=\"created_at\" descending=\"true\"/>\n    </createIndex>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-06: Create indexes on campaign table\n       ============================================================================ -->\n  <changeSet id=\"006-06\" author=\"keyvoro\">\n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign\" indexName=\"idx_campaign_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign\" indexName=\"idx_campaign_status\">\n      <column name=\"status\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign\" indexName=\"idx_campaign_campaign_type\">\n      <column name=\"campaign_type\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign\" indexName=\"idx_campaign_created_by_id\">\n      <column name=\"created_by_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign\" indexName=\"idx_campaign_created_at\">\n      <column name=\"created_at\" descending=\"true\"/>\n    </createIndex>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-07: Create indexes on campaign_step table\n       ============================================================================ -->\n  <changeSet id=\"006-07\" author=\"keyvoro\">\n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_step\" indexName=\"idx_campaign_step_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_step\" indexName=\"idx_campaign_step_campaign_id\">\n      <column name=\"campaign_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_step\" indexName=\"idx_campaign_step_email_template_id\">\n      <column name=\"email_template_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-08: Create indexes on campaign_recipient table\n       ============================================================================ -->\n  <changeSet id=\"006-08\" author=\"keyvoro\">\n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_campaign_id\">\n      <column name=\"campaign_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_lead_id\">\n      <column name=\"lead_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_status\">\n      <column name=\"status\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_email_address\">\n      <column name=\"email_address\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_last_sent_step_id\">\n      <column name=\"last_sent_step_id\"/>\n    </createIndex>\n    \n    <createIndex schemaName=\"keyvoro\" tableName=\"campaign_recipient\" indexName=\"idx_campaign_recipient_created_at\">\n      <column name=\"created_at\" descending=\"true\"/>\n    </createIndex>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-09: Enable RLS on marketing tables\n       ============================================================================ -->\n  <changeSet id=\"006-09\" author=\"keyvoro\">\n    <sql>\n      ALTER TABLE keyvoro.email_template ENABLE ROW LEVEL SECURITY;\n      ALTER TABLE keyvoro.campaign ENABLE ROW LEVEL SECURITY;\n      ALTER TABLE keyvoro.campaign_step ENABLE ROW LEVEL SECURITY;\n      ALTER TABLE keyvoro.campaign_recipient ENABLE ROW LEVEL SECURITY;\n    </sql>\n  </changeSet>\n\n  <!-- ============================================================================\n       CHANGESET 006-10: Create RLS policies for marketing tables\n       ============================================================================ -->\n  <changeSet id=\"006-10\" author=\"keyvoro\">\n    <sql>\n      CREATE POLICY email_template_account_isolation ON keyvoro.email_template\n\
    \        USING (account_id = (current_setting('app.current_account_id', true)::uuid))\n        WITH CHECK (account_id = (current_setting('app.current_account_id', true)::uuid));\n      \n      CREATE POLICY campaign_account_isolation ON keyvoro.campaign\n        USING (account_id = (current_setting('app.current_account_id', true)::uuid))\n        WITH CHECK (account_id = (current_setting('app.current_account_id', true)::uuid));\n      \n      CREATE POLICY campaign_step_account_isolation ON keyvoro.campaign_step\n        USING (account_id = (current_setting('app.current_account_id', true)::uuid))\n        WITH CHECK (account_id = (current_setting('app.current_account_id', true)::uuid));\n      \n      CREATE POLICY campaign_recipient_account_isolation ON keyvoro.campaign_recipient\n        USING (account_id = (current_setting('app.current_account_id', true)::uuid))\n        WITH CHECK (account_id = (current_setting('app.current_account_id', true)::uuid));\n    </sql>\n  </changeSet>\n\n</databaseChangeLog>\n"
  007-referrals-and-properties.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n                        http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.27.xsd\">\n\n  <!-- 007-referrals-and-properties.xml\n       Creates referral partner and property management tables for the Keyvoro CRM.\n       Tables follow the account-based multi-tenant model with row-level security (RLS).\n       \n       Tables created:\n       - referral_partner: Partners who refer opportunities to the account\n       - property: Property listings for real estate operations\n       \n       All tables include:\n       - account_id for multi-tenant isolation\n       - Comprehensive indexes on frequently queried columns\n       - RLS policies for account-scoped data isolation\n       - Proper foreign key relationships with cascade/set null rules\n  -->\n\n  <!-- 007-01: Create referral_partner table -->\n  <changeSet id=\"007-01\" author=\"claude\">\n    <createTable tableName=\"referral_partner\" schemaName=\"keyvoro\">\n      <column name=\"id\" type=\"uuid\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      <column name=\"account_id\" type=\"uuid\">\n        <constraints nullable=\"false\"\n                     foreignKeyName=\"fk_referral_partner_account_id\"\n                     references=\"keyvoro.account(id)\"\n                     deleteCascade=\"true\"/>\n      </column>\n      <column name=\"lead_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"name\" type=\"varchar(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"email\" type=\"varchar(255)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"phone\" type=\"varchar(20)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"company\" type=\"varchar(255)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"status\" type=\"varchar(50)\">\n        <constraints nullable=\"false\" checkConstraint=\"status IN ('active', 'inactive', 'suspended')\"/>\n      </column>\n      <column name=\"referral_source\" type=\"varchar(100)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"total_referrals\" type=\"integer\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>0</defaultValue>\n      </column>\n      <column name=\"successful_referrals\" type=\"integer\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>0</defaultValue>\n      </column>\n      <column name=\"commission_rate\" type=\"numeric(5,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"commission_earned\" type=\"numeric(12,2)\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>0.00</defaultValue>\n      </column>\n      <column name=\"metadata\" type=\"jsonb\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"created_by_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"created_at\" type=\"timestamp with time zone\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>current_timestamp</defaultValue>\n      </column>\n      <column name=\"updated_at\" type=\"timestamp with time zone\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>current_timestamp</defaultValue>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <changeSet id=\"007-01b\" author=\"claude\">\n    <comment>Add SET NULL foreign keys for referral_partner table</comment>\n    <addForeignKeyConstraint constraintName=\"fk_referral_partner_lead_id\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"referral_partner\" baseColumnNames=\"lead_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"lead\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n    <addForeignKeyConstraint constraintName=\"fk_referral_partner_created_by_id\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"referral_partner\" baseColumnNames=\"created_by_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- 007-02: Create property table -->\n  <changeSet id=\"007-02\" author=\"claude\">\n    <createTable tableName=\"property\" schemaName=\"keyvoro\">\n      <column name=\"id\" type=\"uuid\">\n        <constraints primaryKey=\"true\" nullable=\"false\"/>\n      </column>\n      <column name=\"account_id\" type=\"uuid\">\n        <constraints nullable=\"false\"\n                     foreignKeyName=\"fk_property_account_id\"\n                     references=\"keyvoro.account(id)\"\n                     deleteCascade=\"true\"/>\n      </column>\n      <column name=\"lead_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"address\" type=\"varchar(255)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"city\" type=\"varchar(100)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"state\" type=\"varchar(2)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"zip_code\" type=\"varchar(10)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"country\" type=\"varchar(100)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"property_type\" type=\"varchar(50)\">\n        <constraints nullable=\"false\"/>\n      </column>\n      <column name=\"status\" type=\"varchar(50)\">\n        <constraints nullable=\"false\" checkConstraint=\"status IN ('active', 'pending', 'sold', 'archived')\"/>\n      </column>\n      <column name=\"bedroom_count\" type=\"integer\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"bathroom_count\" type=\"numeric(4,1)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"square_footage\" type=\"numeric(10,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"lot_size\" type=\"numeric(10,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"year_built\" type=\"integer\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"list_price\" type=\"numeric(12,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"sold_price\" type=\"numeric(12,2)\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"list_date\" type=\"date\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"sold_date\" type=\"date\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"days_on_market\" type=\"integer\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"description\" type=\"text\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"amenities\" type=\"jsonb\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"images\" type=\"jsonb\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"metadata\" type=\"jsonb\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"assigned_to_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"created_by_id\" type=\"uuid\">\n        <constraints nullable=\"true\"/>\n      </column>\n      <column name=\"created_at\" type=\"timestamp with time zone\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>current_timestamp</defaultValue>\n      </column>\n      <column name=\"updated_at\" type=\"timestamp with time zone\">\n        <constraints nullable=\"false\"/>\n        <defaultValue>current_timestamp</defaultValue>\n      </column>\n    </createTable>\n  </changeSet>\n\n  <!-- 007-03: Create indexes on referral_partner table -->\n  <changeSet id=\"007-03\" author=\"claude\">\n    <createIndex tableName=\"referral_partner\" schemaName=\"keyvoro\" indexName=\"idx_referral_partner_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-04\" author=\"claude\">\n    <createIndex tableName=\"referral_partner\" schemaName=\"keyvoro\" indexName=\"idx_referral_partner_lead_id\">\n      <column name=\"lead_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-05\" author=\"claude\">\n    <createIndex tableName=\"referral_partner\" schemaName=\"keyvoro\" indexName=\"idx_referral_partner_status\">\n      <column name=\"account_id\"/>\n      <column name=\"status\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-06\" author=\"claude\">\n    <createIndex tableName=\"referral_partner\" schemaName=\"keyvoro\" indexName=\"idx_referral_partner_created_by_id\">\n      <column name=\"created_by_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-07\" author=\"claude\">\n    <createIndex tableName=\"referral_partner\" schemaName=\"keyvoro\" indexName=\"idx_referral_partner_created_at\">\n      <column name=\"created_at\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-02b\" author=\"claude\">\n    <comment>Add SET NULL foreign keys for property table</comment>\n    <addForeignKeyConstraint constraintName=\"fk_property_lead_id\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"property\" baseColumnNames=\"lead_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"lead\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n    <addForeignKeyConstraint\
    \ constraintName=\"fk_property_assigned_to_id\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"property\" baseColumnNames=\"assigned_to_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n    <addForeignKeyConstraint constraintName=\"fk_property_created_by_id\"\n        baseTableSchemaName=\"keyvoro\" baseTableName=\"property\" baseColumnNames=\"created_by_id\"\n        referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n        onDelete=\"SET NULL\"/>\n  </changeSet>\n\n  <!-- 007-08: Create indexes on property table -->\n  <changeSet id=\"007-08\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_account_id\">\n      <column name=\"account_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-09\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_lead_id\">\n      <column name=\"lead_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-10\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_status\">\n      <column name=\"account_id\"/>\n      <column name=\"status\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-11\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_assigned_to_id\">\n      <column name=\"assigned_to_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-12\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_created_by_id\">\n      <column name=\"created_by_id\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-13\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_list_date\">\n      <column name=\"list_date\"/>\n    </createIndex>\n  </changeSet>\n\n  <changeSet id=\"007-14\" author=\"claude\">\n    <createIndex tableName=\"property\" schemaName=\"keyvoro\" indexName=\"idx_property_location\">\n      <column name=\"city\"/>\n      <column name=\"state\"/>\n    </createIndex>\n  </changeSet>\n\n  <!-- 007-15: Enable RLS on both tables -->\n  <changeSet id=\"007-15\" author=\"claude\">\n    <sql>\n      ALTER TABLE keyvoro.referral_partner ENABLE ROW LEVEL SECURITY;\n      ALTER TABLE keyvoro.property ENABLE ROW LEVEL SECURITY;\n    </sql>\n  </changeSet>\n\n  <!-- 007-16: Create RLS policies for referral_partner -->\n  <changeSet id=\"007-16\" author=\"claude\">\n    <sql>\n      CREATE POLICY referral_partner_account_isolation ON keyvoro.referral_partner\n        USING (account_id = current_setting('app.current_account_id', true)::uuid)\n        WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n    </sql>\n  </changeSet>\n\n  <!-- 007-17: Create RLS policies for property -->\n  <changeSet id=\"007-17\" author=\"claude\">\n    <sql>\n      CREATE POLICY property_account_isolation ON keyvoro.property\n        USING (account_id = current_setting('app.current_account_id', true)::uuid)\n        WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);\n    </sql>\n  </changeSet>\n\n</databaseChangeLog>"
  008-integrations-and-audit.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-4.27.0.xsd\">\n\n    <!-- 008: Integrations and Audit Tables -->\n\n    <!-- 008-01: Create integration table -->\n    <changeSet id=\"008-01\" author=\"keyvoro\">\n        <createTable tableName=\"integration\" remarks=\"External integrations (Slack, Zapier, etc.) per account\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_integration_account\" referencedTableName=\"account\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"provider\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"false\" checkConstraint=\"provider IN ('slack', 'zapier', 'make', 'n8n', 'custom')\"/>\n            </column>\n            <column name=\"status\" type=\"VARCHAR(50)\">\n                <constraints nullable=\"false\" checkConstraint=\"status IN ('active', 'inactive', 'disabled', 'error')\" defaultValue=\"active\"/>\n            </column>\n            <column name=\"config\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"last_sync_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <!-- 008-02: Create webhook table -->\n    <changeSet id=\"008-02\" author=\"keyvoro\">\n        <createTable tableName=\"webhook\" remarks=\"Webhooks for integration events per account\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_webhook_account\" referencedTableName=\"account\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"integration_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_webhook_integration\" referencedTableName=\"integration\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"url\" type=\"TEXT\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"events\" type=\"TEXT[]\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"secret\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"is_active\" type=\"BOOLEAN\">\n                <constraints nullable=\"false\" defaultValue=\"true\"/>\n            </column>\n            <column name=\"last_triggered_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"failure_count\" type=\"INTEGER\">\n                <constraints nullable=\"false\" defaultValue=\"0\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <!-- 008-03: Create audit_log table -->\n    <changeSet id=\"008-03\" author=\"keyvoro\">\n        <createTable tableName=\"audit_log\" remarks=\"Audit trail of all account actions\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_audit_log_account\" referencedTableName=\"account\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"user_id\" type=\"UUID\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"entity_type\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"entity_id\" type=\"UUID\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"action\" type=\"VARCHAR(50)\">\n                <constraints nullable=\"false\" checkConstraint=\"action IN ('create', 'read', 'update', 'delete', 'export')\"/>\n            </column>\n            <column name=\"changes\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"ip_address\" type=\"INET\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"user_agent\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <!-- 008-03b: Add SET NULL foreign key for audit_log.user_id -->\n    <changeSet id=\"008-03b\" author=\"keyvoro\">\n        <addForeignKeyConstraint constraintName=\"fk_audit_log_user\"\n            baseTableSchemaName=\"keyvoro\" baseTableName=\"audit_log\" baseColumnNames=\"user_id\"\n            referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n            onDelete=\"SET NULL\"/>\n    </changeSet>\n\n    <!-- 008-04: Create api_key table -->\n    <changeSet id=\"008-04\" author=\"keyvoro\">\n        <createTable tableName=\"api_key\" remarks=\"API keys for programmatic access per account\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_api_key_account\" referencedTableName=\"account\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"created_by\" type=\"UUID\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"name\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"key_hash\" type=\"VARCHAR(255)\">\n                <constraints nullable=\"false\" unique=\"true\"/>\n            </column>\n            <column name=\"key_prefix\" type=\"VARCHAR(10)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"scopes\" type=\"TEXT[]\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"last_used_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"expires_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"is_active\" type=\"BOOLEAN\">\n                <constraints nullable=\"false\" defaultValue=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <!-- 008-04b: Add SET NULL foreign key for api_key.created_by -->\n    <changeSet id=\"008-04b\" author=\"keyvoro\">\n        <addForeignKeyConstraint constraintName=\"fk_api_key_user\"\n            baseTableSchemaName=\"keyvoro\" baseTableName=\"api_key\" baseColumnNames=\"created_by\"\n            referencedTableSchemaName=\"keyvoro\" referencedTableName=\"users\" referencedColumnNames=\"id\"\n            onDelete=\"SET NULL\"/>\n    </changeSet>\n\n    <!-- 008-05: Create zapier_integration table -->\n    <changeSet id=\"008-05\" author=\"keyvoro\">\n        <createTable tableName=\"zapier_integration\" remarks=\"Zapier-specific integration settings and credentials per account\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_zapier_integration_account\" referencedTableName=\"account\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"integration_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_zapier_integration_integration\" referencedTableName=\"integration\" referencedColumnName=\"id\" deleteCascade=\"true\" unique=\"true\"/>\n            </column>\n            <column name=\"auth_credentials\"\
    \ type=\"JSONB\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"last_sync_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"sync_status\" type=\"VARCHAR(50)\">\n                <constraints nullable=\"false\" checkConstraint=\"sync_status IN ('idle', 'syncing', 'completed', 'failed')\" defaultValue=\"idle\"/>\n            </column>\n            <column name=\"error_message\" type=\"TEXT\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"metadata\" type=\"JSONB\">\n                <constraints nullable=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <!-- 008-06: Create ai_analysis table -->\n    <changeSet id=\"008-06\" author=\"keyvoro\">\n        <createTable tableName=\"ai_analysis\" remarks=\"AI analysis results for entities per account\">\n            <column name=\"id\" type=\"UUID\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"UUID\">\n                <constraints nullable=\"false\" foreignKeyName=\"fk_ai_analysis_account\" referencedTableName=\"account\" referencedColumnName=\"id\" deleteCascade=\"true\"/>\n            </column>\n            <column name=\"entity_type\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"entity_id\" type=\"UUID\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"analysis_type\" type=\"VARCHAR(100)\">\n                <constraints nullable=\"false\" checkConstraint=\"analysis_type IN ('summary', 'sentiment', 'classification', 'extraction', 'recommendation')\"/>\n            </column>\n            <column name=\"results\" type=\"JSONB\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"confidence_score\" type=\"NUMERIC(3,2)\">\n                <constraints nullable=\"false\" checkConstraint=\"confidence_score >= 0.0 AND confidence_score &lt;= 1.0\"/>\n            </column>\n            <column name=\"processed_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n            <column name=\"created_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n            <column name=\"updated_at\" type=\"TIMESTAMPTZ\">\n                <constraints nullable=\"false\" defaultValueComputed=\"CURRENT_TIMESTAMP\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <!-- 008-07: Enable RLS on integration table -->\n    <changeSet id=\"008-07\" author=\"keyvoro\">\n        <sql>ALTER TABLE keyvoro.integration ENABLE ROW LEVEL SECURITY</sql>\n    </changeSet>\n\n    <!-- 008-08: RLS Policy: integration - account isolation -->\n    <changeSet id=\"008-08\" author=\"keyvoro\">\n        <sql>\n            CREATE POLICY integration_account_isolation ON keyvoro.integration\n            FOR ALL\n            USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n            WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n        </sql>\n    </changeSet>\n\n    <!-- 008-09: Enable RLS on webhook table -->\n    <changeSet id=\"008-09\" author=\"keyvoro\">\n        <sql>ALTER TABLE keyvoro.webhook ENABLE ROW LEVEL SECURITY</sql>\n    </changeSet>\n\n    <!-- 008-10: RLS Policy: webhook - account isolation -->\n    <changeSet id=\"008-10\" author=\"keyvoro\">\n        <sql>\n            CREATE POLICY webhook_account_isolation ON keyvoro.webhook\n            FOR ALL\n            USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n            WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n        </sql>\n    </changeSet>\n\n    <!-- 008-11: Enable RLS on audit_log table -->\n    <changeSet id=\"008-11\" author=\"keyvoro\">\n        <sql>ALTER TABLE keyvoro.audit_log ENABLE ROW LEVEL SECURITY</sql>\n    </changeSet>\n\n    <!-- 008-12: RLS Policy: audit_log - account isolation -->\n    <changeSet id=\"008-12\" author=\"keyvoro\">\n        <sql>\n            CREATE POLICY audit_log_account_isolation ON keyvoro.audit_log\n            FOR ALL\n            USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n            WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n        </sql>\n    </changeSet>\n\n    <!-- 008-13: Enable RLS on api_key table -->\n    <changeSet id=\"008-13\" author=\"keyvoro\">\n        <sql>ALTER TABLE keyvoro.api_key ENABLE ROW LEVEL SECURITY</sql>\n    </changeSet>\n\n    <!-- 008-14: RLS Policy: api_key - account isolation -->\n    <changeSet id=\"008-14\" author=\"keyvoro\">\n        <sql>\n            CREATE POLICY api_key_account_isolation ON keyvoro.api_key\n            FOR ALL\n            USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n            WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n        </sql>\n    </changeSet>\n\n    <!-- 008-15: Enable RLS on zapier_integration table -->\n    <changeSet id=\"008-15\" author=\"keyvoro\">\n        <sql>ALTER TABLE keyvoro.zapier_integration ENABLE ROW LEVEL SECURITY</sql>\n    </changeSet>\n\n    <!-- 008-16: RLS Policy: zapier_integration - account isolation -->\n    <changeSet id=\"008-16\" author=\"keyvoro\">\n        <sql>\n            CREATE POLICY zapier_integration_account_isolation ON keyvoro.zapier_integration\n            FOR ALL\n            USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n            WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n        </sql>\n    </changeSet>\n\n    <!-- 008-17: Enable RLS on ai_analysis table -->\n    <changeSet id=\"008-17\" author=\"keyvoro\">\n        <sql>ALTER TABLE keyvoro.ai_analysis ENABLE ROW LEVEL SECURITY</sql>\n    </changeSet>\n\n    <!-- 008-18: RLS Policy: ai_analysis - account isolation -->\n    <changeSet id=\"008-18\" author=\"keyvoro\">\n        <sql>\n            CREATE POLICY ai_analysis_account_isolation ON keyvoro.ai_analysis\n            FOR ALL\n            USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n            WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)\n        </sql>\n    </changeSet>\n\n    <!-- 008-19: Index on integration (account_id, status) -->\n    <changeSet id=\"008-19\" author=\"keyvoro\">\n        <createIndex tableName=\"integration\" indexName=\"idx_integration_account_status\">\n            <column name=\"account_id\"/>\n            <column name=\"status\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-20: Index on integration (account_id, provider) -->\n    <changeSet id=\"008-20\" author=\"keyvoro\">\n        <createIndex tableName=\"integration\" indexName=\"idx_integration_account_provider\">\n            <column name=\"account_id\"/>\n            <column name=\"provider\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-21: Index on webhook (account_id, is_active) -->\n    <changeSet id=\"008-21\" author=\"keyvoro\">\n        <createIndex tableName=\"webhook\" indexName=\"idx_webhook_account_active\">\n            <column name=\"account_id\"/>\n            <column name=\"is_active\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-22: Index on webhook (integration_id) -->\n    <changeSet id=\"008-22\" author=\"keyvoro\">\n        <createIndex tableName=\"webhook\" indexName=\"idx_webhook_integration\">\n            <column name=\"integration_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-23: Index on audit_log (account_id, created_at) -->\n    <changeSet id=\"008-23\" author=\"keyvoro\">\n        <createIndex tableName=\"audit_log\" indexName=\"idx_audit_log_account_created\">\n            <column name=\"account_id\"/>\n            <column name=\"created_at\" descending=\"true\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-24: Index on audit_log (entity_type, entity_id) -->\n    <changeSet id=\"008-24\" author=\"keyvoro\">\n        <createIndex tableName=\"audit_log\" indexName=\"idx_audit_log_entity\">\n            <column name=\"entity_type\"/>\n            <column name=\"entity_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-25: Index on audit_log (user_id) -->\n    <changeSet id=\"008-25\" author=\"keyvoro\">\n        <createIndex tableName=\"audit_log\" indexName=\"idx_audit_log_user\">\n            <column name=\"user_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-26: Index on api_key (account_id, is_active) -->\n    <changeSet id=\"008-26\" author=\"keyvoro\">\n        <createIndex tableName=\"api_key\" indexName=\"idx_api_key_account_active\">\n            <column name=\"account_id\"/>\n            <column name=\"is_active\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-27: Index on api_key (created_by) -->\n    <changeSet id=\"008-27\" author=\"keyvoro\">\n        <createIndex tableName=\"api_key\" indexName=\"idx_api_key_created_by\">\n            <column name=\"created_by\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-28: Index on zapier_integration (account_id) -->\n    <changeSet id=\"008-28\"\
    \ author=\"keyvoro\">\n        <createIndex tableName=\"zapier_integration\" indexName=\"idx_zapier_integration_account\">\n            <column name=\"account_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-29: Index on ai_analysis (account_id, entity_type, entity_id) -->\n    <changeSet id=\"008-29\" author=\"keyvoro\">\n        <createIndex tableName=\"ai_analysis\" indexName=\"idx_ai_analysis_account_entity\">\n            <column name=\"account_id\"/>\n            <column name=\"entity_type\"/>\n            <column name=\"entity_id\"/>\n        </createIndex>\n    </changeSet>\n\n    <!-- 008-30: Index on ai_analysis (account_id, analysis_type) -->\n    <changeSet id=\"008-30\" author=\"keyvoro\">\n        <createIndex tableName=\"ai_analysis\" indexName=\"idx_ai_analysis_account_type\">\n            <column name=\"account_id\"/>\n            <column name=\"analysis_type\"/>\n        </createIndex>\n    </changeSet>\n\n</databaseChangeLog>\n"
  009-better-auth-tables.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n        http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd\">\n\n    <!-- Better Auth core tables for authentication -->\n    <!-- These tables are managed by Better Auth's Drizzle adapter -->\n\n    <changeSet id=\"009-01\" author=\"cesar\">\n        <comment>Create Better Auth user table</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"auth_user\">\n            <column name=\"id\" type=\"text\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"name\" type=\"text\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"email\" type=\"text\">\n                <constraints nullable=\"false\" unique=\"true\"/>\n            </column>\n            <column name=\"email_verified\" type=\"boolean\" defaultValueBoolean=\"false\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"image\" type=\"text\"/>\n            <column name=\"created_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"updated_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"009-02\" author=\"cesar\">\n        <comment>Create Better Auth session table</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"auth_session\">\n            <column name=\"id\" type=\"text\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"expires_at\" type=\"timestamptz\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"token\" type=\"text\">\n                <constraints nullable=\"false\" unique=\"true\"/>\n            </column>\n            <column name=\"created_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"updated_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"ip_address\" type=\"text\"/>\n            <column name=\"user_agent\" type=\"text\"/>\n            <column name=\"user_id\" type=\"text\">\n                <constraints nullable=\"false\"\n                             foreignKeyName=\"fk_auth_session_user\"\n                             references=\"keyvoro.auth_user(id)\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"009-03\" author=\"cesar\">\n        <comment>Create Better Auth account table (OAuth linked accounts)</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"auth_account\">\n            <column name=\"id\" type=\"text\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"account_id\" type=\"text\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"provider_id\" type=\"text\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"user_id\" type=\"text\">\n                <constraints nullable=\"false\"\n                             foreignKeyName=\"fk_auth_account_user\"\n                             references=\"keyvoro.auth_user(id)\"/>\n            </column>\n            <column name=\"access_token\" type=\"text\"/>\n            <column name=\"refresh_token\" type=\"text\"/>\n            <column name=\"id_token\" type=\"text\"/>\n            <column name=\"access_token_expires_at\" type=\"timestamptz\"/>\n            <column name=\"refresh_token_expires_at\" type=\"timestamptz\"/>\n            <column name=\"scope\" type=\"text\"/>\n            <column name=\"password\" type=\"text\"/>\n            <column name=\"created_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"updated_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n    <changeSet id=\"009-04\" author=\"cesar\">\n        <comment>Create Better Auth verification table (OAuth state, PKCE, email tokens)</comment>\n        <createTable schemaName=\"keyvoro\" tableName=\"auth_verification\">\n            <column name=\"id\" type=\"text\">\n                <constraints primaryKey=\"true\" nullable=\"false\"/>\n            </column>\n            <column name=\"identifier\" type=\"text\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"value\" type=\"text\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"expires_at\" type=\"timestamptz\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"created_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n            <column name=\"updated_at\" type=\"timestamptz\" defaultValueComputed=\"NOW()\">\n                <constraints nullable=\"false\"/>\n            </column>\n        </createTable>\n    </changeSet>\n\n</databaseChangeLog>\n"
  changelog.xml: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<databaseChangeLog\n    xmlns=\"http://www.liquibase.org/xml/ns/dbchangelog\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.liquibase.org/xml/ns/dbchangelog\n        http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd\">\n\n    <!-- Phase 1: Foundation -->\n    <include file=\"changelogs/001-organization-and-users.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/002-contacts.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/003-pipeline-and-deals.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/004-activities-and-tasks.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/005-documents.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/006-marketing.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/007-referrals-and-properties.xml\" relativeToChangelogFile=\"true\"/>\n    <include file=\"changelogs/008-integrations-and-audit.xml\" relativeToChangelogFile=\"true\"/>\n\n    <!-- Authentication -->\n    <include file=\"changelogs/009-better-auth-tables.xml\" relativeToChangelogFile=\"true\"/>\n\n</databaseChangeLog>\n"
