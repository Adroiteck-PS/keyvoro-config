        <!-- ================================================================== -->
        <!-- 9. Reassign existing orphan data to the seed account               -->
        <!--    (if leads/deals/activities already exist with a different        -->
        <!--     account_id, this links them to the E2E account)                -->
        <!-- ================================================================== -->
        <changeSet id="018-09-adopt-orphans" author="cesar">
            <comment>Link existing data rows that have a NULL or mismatched account_id to the E2E test account. Also assign deals to default pipeline stages.</comment>
            <sql>
                -- Adopt leads without a valid account
                UPDATE keyvoro.lead
                   SET account_id = '00000000-0000-4000-a000-000000000001'
                 WHERE account_id NOT IN (SELECT id FROM keyvoro.account);
    
                -- Adopt deals without a valid account
                UPDATE keyvoro.deal
                   SET account_id = '00000000-0000-4000-a000-000000000001'
                 WHERE account_id NOT IN (SELECT id FROM keyvoro.account);
    
                -- Adopt loans without a valid account
                UPDATE keyvoro.loan
                   SET account_id = '00000000-0000-4000-a000-000000000001'
                 WHERE account_id NOT IN (SELECT id FROM keyvoro.account);
    
                -- Adopt tasks without a valid account
                UPDATE keyvoro.task
                   SET account_id = '00000000-0000-4000-a000-000000000001'
                 WHERE account_id NOT IN (SELECT id FROM keyvoro.account);
    
                -- Adopt activities without a valid account
                UPDATE keyvoro.activity
                   SET account_id = '00000000-0000-4000-a000-000000000001'
                 WHERE account_id NOT IN (SELECT id FROM keyvoro.account);
    
                -- Assign deals with invalid pipeline_stage_id to "New" stage
                UPDATE keyvoro.deal
                   SET pipeline_stage_id = '00000000-0000-4000-a000-000000000011'
                 WHERE pipeline_stage_id NOT IN (SELECT id FROM keyvoro.pipeline_stage);
            </sql>
        </changeSet>
    
    </databaseChangeLog>
