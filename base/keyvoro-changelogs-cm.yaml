            <addDefaultValue schemaName="keyvoro" tableName="rate_sheet" columnName="updated_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <!-- ── Changeset 4: Rate Sheet Entry Table ─────────────────── -->
        <changeSet id="016-04-create-rate-sheet-entry" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><tableExists tableName="rate_sheet_entry" schemaName="keyvoro"/></not>
            </preConditions>
    
            <createTable tableName="rate_sheet_entry" schemaName="keyvoro">
                <column name="id" type="uuid">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="rate_sheet_id" type="uuid">
                    <constraints nullable="false"/>
                </column>
                <column name="loan_type" type="varchar(30)">
                    <constraints nullable="false"/>
                </column>
                <column name="term" type="int">
                    <constraints nullable="false"/>
                </column>
                <column name="rate" type="varchar(10)">
                    <constraints nullable="false"/>
                </column>
                <column name="apr" type="varchar(10)"/>
                <column name="points" type="varchar(10)" defaultValue="0"/>
                <column name="min_loan_amount" type="varchar(20)"/>
                <column name="max_loan_amount" type="varchar(20)"/>
                <column name="min_ltv" type="varchar(10)"/>
                <column name="max_ltv" type="varchar(10)"/>
                <column name="min_credit_score" type="int"/>
                <column name="notes" type="text"/>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
            </createTable>
    
            <addForeignKeyConstraint
                baseTableSchemaName="keyvoro" baseTableName="rate_sheet_entry" baseColumnNames="rate_sheet_id"
                constraintName="fk_rate_entry_sheet"
                referencedTableSchemaName="keyvoro" referencedTableName="rate_sheet" referencedColumnNames="id"
                onDelete="CASCADE"/>
    
            <createIndex tableName="rate_sheet_entry" schemaName="keyvoro" indexName="idx_rate_entry_sheet">
                <column name="rate_sheet_id"/>
            </createIndex>
            <createIndex tableName="rate_sheet_entry" schemaName="keyvoro" indexName="idx_rate_entry_type_term">
                <column name="loan_type"/>
                <column name="term"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="016-04-create-rate-sheet-entry-defaults" author="claude">
            <comment>Set defaults for columns on rate_sheet_entry</comment>
            <addDefaultValue schemaName="keyvoro" tableName="rate_sheet_entry" columnName="id" defaultValueComputed="gen_random_uuid()"/>
            <addDefaultValue schemaName="keyvoro" tableName="rate_sheet_entry" columnName="created_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <!-- ── Changeset 5: Property Listing Table ─────────────────── -->
        <changeSet id="016-05-create-property-listing" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><tableExists tableName="property_listing" schemaName="keyvoro"/></not>
            </preConditions>
    
            <createTable tableName="property_listing" schemaName="keyvoro">
                <column name="id" type="uuid">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="uuid">
                    <constraints nullable="false"/>
                </column>
                <column name="loan_id" type="uuid"/>
                <column name="slug" type="varchar(200)">
                    <constraints nullable="false" unique="true"/>
                </column>
                <column name="title" type="varchar(300)">
                    <constraints nullable="false"/>
                </column>
                <column name="description" type="text"/>
                <column name="address" type="varchar(300)">
                    <constraints nullable="false"/>
                </column>
                <column name="city" type="varchar(100)">
                    <constraints nullable="false"/>
                </column>
                <column name="state" type="varchar(50)">
                    <constraints nullable="false"/>
                </column>
                <column name="zip" type="varchar(10)">
                    <constraints nullable="false"/>
                </column>
                <column name="property_type" type="varchar(30)"/>
                <column name="bedrooms" type="int"/>
                <column name="bathrooms" type="varchar(5)"/>
                <column name="square_feet" type="int"/>
                <column name="year_built" type="int"/>
                <column name="list_price" type="varchar(20)"/>
                <column name="photos" type="text"/>
                <column name="agent_name" type="varchar(200)"/>
                <column name="agent_phone" type="varchar(20)"/>
                <column name="agent_email" type="varchar(320)"/>
                <column name="status" type="varchar(20)" defaultValue="draft">
                    <constraints nullable="false"/>
                </column>
                <column name="view_count" type="int" defaultValueNumeric="0">
                    <constraints nullable="false"/>
                </column>
                <column name="leads_captured" type="int" defaultValueNumeric="0">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
            </createTable>
    
            <addForeignKeyConstraint
                baseTableSchemaName="keyvoro" baseTableName="property_listing" baseColumnNames="account_id"
                constraintName="fk_property_listing_account"
                referencedTableSchemaName="keyvoro" referencedTableName="account" referencedColumnNames="id"
                onDelete="CASCADE"/>
            <addForeignKeyConstraint
                baseTableSchemaName="keyvoro" baseTableName="property_listing" baseColumnNames="loan_id"
                constraintName="fk_property_listing_loan"
                referencedTableSchemaName="keyvoro" referencedTableName="loan" referencedColumnNames="id"
                onDelete="SET NULL"/>
    
            <createIndex tableName="property_listing" schemaName="keyvoro" indexName="idx_property_listing_account">
                <column name="account_id"/>
            </createIndex>
            <createIndex tableName="property_listing" schemaName="keyvoro" indexName="idx_property_listing_slug">
                <column name="slug"/>
            </createIndex>
            <createIndex tableName="property_listing" schemaName="keyvoro" indexName="idx_property_listing_status">
                <column name="status"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="016-05-create-property-listing-defaults" author="claude">
            <comment>Set defaults for columns on property_listing</comment>
            <addDefaultValue schemaName="keyvoro" tableName="property_listing" columnName="id" defaultValueComputed="gen_random_uuid()"/>
            <addDefaultValue schemaName="keyvoro" tableName="property_listing" columnName="created_at" defaultValueComputed="now()"/>
            <addDefaultValue schemaName="keyvoro" tableName="property_listing" columnName="updated_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <!-- ── Changeset 6: RLS ────────────────────────────────────── -->
        <changeSet id="016-06-phase5-rls" author="keyvoro">
            <sql>
                ALTER TABLE keyvoro.portal_session ENABLE ROW LEVEL SECURITY;
                ALTER TABLE keyvoro.portal_message ENABLE ROW LEVEL SECURITY;
                ALTER TABLE keyvoro.rate_sheet ENABLE ROW LEVEL SECURITY;
                ALTER TABLE keyvoro.rate_sheet_entry ENABLE ROW LEVEL SECURITY;
                ALTER TABLE keyvoro.property_listing ENABLE ROW LEVEL SECURITY;
            </sql>
        </changeSet>
    
    </databaseChangeLog>
  017-lead-assignment.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
      <!-- ============================================================================
           017-lead-assignment.xml
           Purpose: Add assigned_to_id to lead table for round-robin assignment
           ============================================================================ -->
    
      <!-- CHANGESET 017-01: Add assigned_to_id column -->
      <changeSet id="017-01" author="keyvoro">
        <preConditions onFail="MARK_RAN">
          <not>
            <columnExists schemaName="keyvoro" tableName="lead" columnName="assigned_to_id"/>
          </not>
        </preConditions>
    
        <addColumn schemaName="keyvoro" tableName="lead">
          <column name="assigned_to_id" type="UUID">
            <constraints nullable="true"/>
          </column>
        </addColumn>
      </changeSet>
    
      <!-- CHANGESET 017-02: Add FK constraint -->
      <changeSet id="017-02" author="keyvoro">
        <preConditions onFail="MARK_RAN">
          <columnExists schemaName="keyvoro" tableName="lead" columnName="assigned_to_id"/>
          <not>
            <foreignKeyConstraintExists schemaName="keyvoro" foreignKeyName="fk_lead_assigned_to_id"/>
          </not>
        </preConditions>
    
        <addForeignKeyConstraint constraintName="fk_lead_assigned_to_id"
          baseTableSchemaName="keyvoro" baseTableName="lead" baseColumnNames="assigned_to_id"
          referencedTableSchemaName="keyvoro" referencedTableName="users" referencedColumnNames="id"
          onDelete="SET NULL"/>
      </changeSet>
    
      <!-- CHANGESET 017-03: Add index on assigned_to_id -->
      <changeSet id="017-03" author="keyvoro">
        <preConditions onFail="MARK_RAN">
          <columnExists schemaName="keyvoro" tableName="lead" columnName="assigned_to_id"/>
          <not>
            <indexExists schemaName="keyvoro" indexName="idx_lead_assigned_to_id"/>
          </not>
        </preConditions>
    
        <createIndex schemaName="keyvoro" tableName="lead" indexName="idx_lead_assigned_to_id">
          <column name="assigned_to_id"/>
        </createIndex>
      </changeSet>
    
      <!-- CHANGESET 017-04: Enable RLS policy update for assigned_to column -->
      <!-- RLS already active on lead table from 002; no new policy needed since
           account_id isolation covers all rows regardless of assignment. -->
    
    </databaseChangeLog>
  018-open-house-tables.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!-- 018: Open House Management Tables -->
    
        <!-- 018-01: Create open_house table -->
        <changeSet id="018-01" author="keyvoro">
            <createTable tableName="open_house" remarks="Open house events linked to properties">
                <column name="id" type="UUID" defaultValueComputed="gen_random_uuid()">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_open_house_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="property_id" type="UUID">
                    <constraints nullable="true" foreignKeyName="fk_open_house_property" referencedTableName="property" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="created_by_id" type="UUID">
                    <constraints nullable="true" foreignKeyName="fk_open_house_user" referencedTableName="users" referencedColumnNames="id" deleteCascade="false"/>
                </column>
                <column name="title" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
                <column name="event_date" type="DATE">
                    <constraints nullable="false"/>
                </column>
                <column name="start_time" type="TIME">
                    <constraints nullable="false"/>
                </column>
                <column name="end_time" type="TIME">
                    <constraints nullable="false"/>
                </column>
                <column name="address" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="notes" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ" defaultValueComputed="CURRENT_TIMESTAMP">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ" defaultValueComputed="CURRENT_TIMESTAMP">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <!-- 018-02: Create open_house_attendee table -->
        <changeSet id="018-02" author="keyvoro">
            <createTable tableName="open_house_attendee" remarks="Attendees registered for open houses">
                <column name="id" type="UUID" defaultValueComputed="gen_random_uuid()">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="open_house_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_oha_open_house" referencedTableName="open_house" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="lead_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_oha_lead" referencedTableName="lead" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_oha_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="attended" type="BOOLEAN" defaultValueBoolean="false">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ" defaultValueComputed="CURRENT_TIMESTAMP">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ" defaultValueComputed="CURRENT_TIMESTAMP">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <!-- 018-03: Unique constraint on open_house_attendee (open_house_id, lead_id) -->
        <changeSet id="018-03" author="keyvoro">
            <addUniqueConstraint tableName="open_house_attendee"
                columnNames="open_house_id, lead_id"
                constraintName="uq_oha_open_house_lead"/>
        </changeSet>
    
        <!-- 018-04: RLS on open_house -->
        <changeSet id="018-04" author="keyvoro">
            <sql>ALTER TABLE keyvoro.open_house ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
        <changeSet id="018-05" author="keyvoro">
            <sql>
                CREATE POLICY open_house_account_isolation ON keyvoro.open_house
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 018-06: RLS on open_house_attendee -->
        <changeSet id="018-06" author="keyvoro">
            <sql>ALTER TABLE keyvoro.open_house_attendee ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
        <changeSet id="018-07" author="keyvoro">
            <sql>
                CREATE POLICY oha_account_isolation ON keyvoro.open_house_attendee
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 018-08: Indexes -->
        <changeSet id="018-08" author="keyvoro">
            <createIndex tableName="open_house" indexName="idx_open_house_account_date">
                <column name="account_id"/>
                <column name="event_date"/>
            </createIndex>
        </changeSet>
        <changeSet id="018-09" author="keyvoro">
            <createIndex tableName="open_house_attendee" indexName="idx_oha_account">
                <column name="account_id"/>
            </createIndex>
        </changeSet>
        <changeSet id="018-10" author="keyvoro">
            <createIndex tableName="open_house_attendee" indexName="idx_oha_lead">
                <column name="lead_id"/>
            </createIndex>
        </changeSet>
    
    </databaseChangeLog>
  018-seed-data.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!--
          018-seed-data.xml — Seed reference data for the E2E test account.
    
          This changelog populates default pipeline stages, document categories,
          notification templates, rate sheet entries, sample automations, and
          a referral partner so the deployed app has functional data out of the box.
    
          All rows are scoped to a single well-known account UUID so they can be
          safely cleaned up or re-run with preconditions.
    
          Well-known IDs (deterministic UUIDs for idempotency):
            account   = 00000000-0000-4000-a000-000000000001
            user      = 00000000-0000-4000-a000-000000000002
            pipeline  = 00000000-0000-4000-a000-000000000010
            stages    = 00000000-0000-4000-a000-0000000000{11-15}
        -->
    
        <!-- ================================================================== -->
        <!-- 1. Default Account (E2E Test Org)                                  -->
        <!-- ================================================================== -->
        <changeSet id="018-01-account" author="cesar">
            <preConditions onFail="MARK_RAN">
                <sqlCheck expectedResult="0">
                    SELECT count(*) FROM keyvoro.account WHERE id = '00000000-0000-4000-a000-000000000001'
                </sqlCheck>
            </preConditions>
            <insert tableName="account" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000001"/>
                <column name="name" value="Keyvoro Demo"/>
                <column name="domain" value="keyvoro.com"/>
                <column name="plan_type" value="pro"/>
                <column name="status" value="active"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
        </changeSet>
    
        <!-- ================================================================== -->
        <!-- 2. E2E Test User (bridge auth_user → CRM users)                    -->
        <!--    The auth_user row is created by Better Auth on sign-in.          -->
        <!--    This creates the CRM users row that context.ts resolves.         -->
        <!--    auth_id will be updated by 018-02b to match the real auth_user.  -->
        <!-- ================================================================== -->
        <changeSet id="018-02-user" author="cesar">
            <preConditions onFail="MARK_RAN">
                <sqlCheck expectedResult="0">
                    SELECT count(*) FROM keyvoro.users WHERE id = '00000000-0000-4000-a000-000000000002'
                </sqlCheck>
            </preConditions>
            <insert tableName="users" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000002"/>
                <column name="account_id" value="00000000-0000-4000-a000-000000000001"/>
                <column name="email" value="e2e-test@keyvoro.com"/>
                <column name="name" value="E2E Test User"/>
                <column name="role" value="owner"/>
                <column name="auth_provider" value="email"/>
                <column name="auth_id" value="PLACEHOLDER_WILL_UPDATE"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
        </changeSet>
    
        <changeSet id="018-02b-link-auth" author="cesar">
            <comment>Link CRM user to Better Auth user (resolve auth_id from auth_user table)</comment>
            <sql>
                UPDATE keyvoro.users
                   SET auth_id = (
                       SELECT id FROM keyvoro.auth_user
                        WHERE email = 'e2e-test@keyvoro.com'
                        LIMIT 1
                   )
                 WHERE id = '00000000-0000-4000-a000-000000000002'
                   AND EXISTS (
                       SELECT 1 FROM keyvoro.auth_user WHERE email = 'e2e-test@keyvoro.com'
                   );
            </sql>
        </changeSet>
    
        <!-- ================================================================== -->
        <!-- 3. Default Pipeline + 5 Stages                                     -->
        <!-- ================================================================== -->
        <changeSet id="018-03-pipeline" author="cesar">
            <preConditions onFail="MARK_RAN">
                <sqlCheck expectedResult="0">
                    SELECT count(*) FROM keyvoro.pipeline WHERE id = '00000000-0000-4000-a000-000000000010'
                </sqlCheck>
            </preConditions>
            <insert tableName="pipeline" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000010"/>
                <column name="account_id" value="00000000-0000-4000-a000-000000000001"/>
                <column name="name" value="Mortgage Pipeline"/>
                <column name="description" value="Default mortgage origination pipeline"/>
                <column name="color" value="#6c63ff"/>
                <column name="is_default" valueBoolean="true"/>
                <column name="display_order" valueNumeric="1"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
    
            <!-- Stage 1: New -->
            <insert tableName="pipeline_stage" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000011"/>
                <column name="pipeline_id" value="00000000-0000-4000-a000-000000000010"/>
                <column name="name" value="New"/>
                <column name="description" value="New lead or inquiry — not yet contacted"/>
                <column name="probability" valueNumeric="10"/>
                <column name="display_order" valueNumeric="1"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
    
            <!-- Stage 2: Contacted -->
            <insert tableName="pipeline_stage" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000012"/>
                <column name="pipeline_id" value="00000000-0000-4000-a000-000000000010"/>
                <column name="name" value="Contacted"/>
                <column name="description" value="Initial outreach completed — awaiting response"/>
                <column name="probability" valueNumeric="25"/>
                <column name="display_order" valueNumeric="2"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
    
            <!-- Stage 3: Qualified -->
            <insert tableName="pipeline_stage" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000013"/>
                <column name="pipeline_id" value="00000000-0000-4000-a000-000000000010"/>
                <column name="name" value="Qualified"/>
                <column name="description" value="Pre-qualified — borrower meets basic lending criteria"/>
                <column name="probability" valueNumeric="50"/>
                <column name="display_order" valueNumeric="3"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
    
            <!-- Stage 4: Proposal -->
            <insert tableName="pipeline_stage" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000014"/>
                <column name="pipeline_id" value="00000000-0000-4000-a000-000000000010"/>
                <column name="name" value="Proposal"/>
                <column name="description" value="Rate quote or loan estimate sent — awaiting acceptance"/>
                <column name="probability" valueNumeric="75"/>
                <column name="display_order" valueNumeric="4"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
    
            <!-- Stage 5: Won -->
            <insert tableName="pipeline_stage" schemaName="keyvoro">
                <column name="id" value="00000000-0000-4000-a000-000000000015"/>
                <column name="pipeline_id" value="00000000-0000-4000-a000-000000000010"/>
                <column name="name" value="Won"/>
                <column name="description" value="Loan application submitted — deal closed"/>
                <column name="probability" valueNumeric="100"/>
                <column name="display_order" valueNumeric="5"/>
                <column name="created_at" valueComputed="now()"/>
                <column name="updated_at" valueComputed="now()"/>
            </insert>
        </changeSet>
    
        <!-- ================================================================== -->
        <!-- 4. Default Document Categories (11 types)                          -->
        <!-- ================================================================== -->
        <changeSet id="018-04-doc-categories" author="cesar">        <preConditions onFail="MARK_RAN">
                <sqlCheck expectedResult="0">
                    SELECT count(*) FROM keyvoro.document_category
                     WHERE account_id = '00000000-0000-4000-a000-000000000001' AND is_default = 1
                </sqlCheck>
            </preConditions>
    
            <insert tableName="document_category" schemaName="keyvoro">
                <column name="account_id" value="00000000-0000-4000-a000-000000000001"/>
                <column name="name" value="Income Verification"/>
                <column name="type" value="income_verification"/>
                <column name="description" value="Pay stubs, W-2s, 1099s, or employer verification letter"/>
                <column name="display_order" valueNumeric="1"/>
                <column name="is_default" valueNumeric="1"/>
                <column name="required_for_loan_types" value='["conventional","fha","va","usda","jumbo"]'/>
                <column name="created_at" valueComputed="now()"/>
            </insert>
            <insert tableName="document_category" schemaName="keyvoro">
                <column name="account_id" value="00000000-0000-4000-a000-000000000001"/>
                <column name="name" value="Asset Statement"/>
