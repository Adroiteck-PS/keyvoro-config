      <!-- 007-referrals-and-properties.xml
           Creates referral partner and property management tables for the Keyvoro CRM.
           Tables follow the account-based multi-tenant model with row-level security (RLS).
           
           Tables created:
           - referral_partner: Partners who refer opportunities to the account
           - property: Property listings for real estate operations
           
           All tables include:
           - account_id for multi-tenant isolation
