    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <changeSet id="001-01" author="cesar">
            <comment>Create account table (renamed from organization)</comment>
            <createTable tableName="account">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="name" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="domain" type="TEXT">
                    <constraints nullable="false" unique="true"/>
                </column>
                <column name="plan_type" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="status" type="TEXT" defaultValue="active">
                    <constraints nullable="false"/>
                </column>
                <column name="stripe_customer_id" type="TEXT"/>
                <column name="stripe_subscription_id" type="TEXT"/>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
            <createIndex tableName="account" indexName="idx_account_domain">
                <column name="domain"/>
            </createIndex>
            <createIndex tableName="account" indexName="idx_account_created">
                <column name="created_at"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="001-01-defaults" author="claude">
            <comment>Set defaults for columns on account</comment>
            <addDefaultValue schemaName="keyvoro" tableName="account" columnName="id" defaultValueComputed="gen_random_uuid()"/>
            <addDefaultValue schemaName="keyvoro" tableName="account" columnName="created_at" defaultValueComputed="now()"/>
            <addDefaultValue schemaName="keyvoro" tableName="account" columnName="updated_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <changeSet id="001-02" author="cesar">
            <comment>Create users table (renamed from res_user)</comment>
            <createTable tableName="users">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_users_account" references="keyvoro.account(id)"/>
                </column>
                <column name="email" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="name" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="avatar_url" type="TEXT"/>
                <column name="role" type="TEXT" defaultValue="member">
                    <constraints nullable="false"/>
                </column>
                <column name="auth_provider" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="auth_id" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="phone" type="TEXT"/>
                <column name="last_login_at" type="TIMESTAMPTZ"/>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
            <createIndex tableName="users" indexName="idx_users_account_id">
                <column name="account_id"/>
            </createIndex>
            <createIndex tableName="users" indexName="idx_users_email">
                <column name="email"/>
            </createIndex>
            <createIndex tableName="users" indexName="idx_users_auth_provider_id">
                <column name="auth_provider"/>
                <column name="auth_id"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="001-02-defaults" author="claude">
            <comment>Set defaults for columns on users</comment>
            <addDefaultValue schemaName="keyvoro" tableName="users" columnName="id" defaultValueComputed="gen_random_uuid()"/>
            <addDefaultValue schemaName="keyvoro" tableName="users" columnName="created_at" defaultValueComputed="now()"/>
            <addDefaultValue schemaName="keyvoro" tableName="users" columnName="updated_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <changeSet id="001-03" author="cesar">
            <comment>Enable Row Level Security for account table</comment>
            <sql>
                ALTER TABLE keyvoro.account ENABLE ROW LEVEL SECURITY;
                
                CREATE POLICY rls_account_isolation ON keyvoro.account
                    FOR ALL
                    USING (id = current_setting('app.current_account_id', true)::uuid);
            </sql>
        </changeSet>
    
        <changeSet id="001-04" author="cesar">
            <comment>Enable Row Level Security for users table</comment>
            <sql>
                ALTER TABLE keyvoro.users ENABLE ROW LEVEL SECURITY;
                
                CREATE POLICY rls_users_isolation ON keyvoro.users
                    FOR ALL
                    USING (account_id = current_setting('app.current_account_id', true)::uuid);
            </sql>
        </changeSet>
    
    </databaseChangeLog>
