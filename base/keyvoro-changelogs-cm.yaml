    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <changeSet id="012-01" author="claude">
            <comment>Create automation table for workflow engine</comment>
            <createTable schemaName="keyvoro" tableName="automation">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_automation_account" references="keyvoro.account(id)" deleteCascade="true"/>
                </column>
                <column name="name" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
                <column name="description" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="status" type="TEXT" defaultValue="draft">
                    <constraints nullable="false"/>
                </column>
                <column name="trigger_type" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="trigger_config" type="JSONB">
                    <constraints nullable="false"/>
                </column>
                <column name="conditions" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="actions" type="JSONB">
                    <constraints nullable="false"/>
                </column>
                <column name="execution_count" type="INTEGER" defaultValueNumeric="0">
                    <constraints nullable="false"/>
                </column>
                <column name="last_executed_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="012-01-defaults" author="claude">
            <comment>Set defaults for timestamp columns on automation table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="automation" columnName="created_at" defaultValueComputed="NOW()"/>
            <addDefaultValue schemaName="keyvoro" tableName="automation" columnName="updated_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="012-02" author="claude">
            <comment>Create automation_log table</comment>
            <createTable schemaName="keyvoro" tableName="automation_log">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="automation_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_automation_log_automation" references="keyvoro.automation(id)" deleteCascade="true"/>
                </column>
                <column name="loan_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="lead_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="status" type="TEXT" defaultValue="triggered">
                    <constraints nullable="false"/>
                </column>
                <column name="actions_executed" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="error" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="executed_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="012-02-defaults" author="claude">
            <comment>Set defaults for timestamp columns on automation_log table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="automation_log" columnName="executed_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="012-03" author="claude">
            <comment>Add foreign keys for automation_log linked entities</comment>
            <addForeignKeyConstraint constraintName="fk_automation_log_loan"
                baseTableSchemaName="keyvoro" baseTableName="automation_log" baseColumnNames="loan_id"
                referencedTableSchemaName="keyvoro" referencedTableName="loan" referencedColumnNames="id"
                onDelete="SET NULL"/>
            <addForeignKeyConstraint constraintName="fk_automation_log_lead"
                baseTableSchemaName="keyvoro" baseTableName="automation_log" baseColumnNames="lead_id"
                referencedTableSchemaName="keyvoro" referencedTableName="lead" referencedColumnNames="id"
                onDelete="SET NULL"/>
        </changeSet>
    
        <changeSet id="012-04" author="claude">
            <comment>Create indexes on automation and automation_log tables</comment>
            <createIndex schemaName="keyvoro" tableName="automation" indexName="idx_automation_account_id">
                <column name="account_id"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="automation" indexName="idx_automation_status">
                <column name="status"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="automation" indexName="idx_automation_trigger_type">
                <column name="trigger_type"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="automation_log" indexName="idx_automation_log_automation_id">
                <column name="automation_id"/>
            </createIndex>
            <createIndex schemaName="keyvoro" tableName="automation_log" indexName="idx_automation_log_status">
                <column name="status"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="012-05" author="claude">
            <comment>Enable RLS on automation and automation_log tables</comment>
            <sql>
                ALTER TABLE keyvoro.automation ENABLE ROW LEVEL SECURITY;
                DROP POLICY IF EXISTS rls_automation_isolation ON keyvoro.automation;
                CREATE POLICY rls_automation_isolation ON keyvoro.automation
                    USING (account_id = current_setting('app.current_account_id', true)::uuid)
                    WITH CHECK (account_id = current_setting('app.current_account_id', true)::uuid);
    
                ALTER TABLE keyvoro.automation_log ENABLE ROW LEVEL SECURITY;
                DROP POLICY IF EXISTS rls_automation_log_isolation ON keyvoro.automation_log;
                CREATE POLICY rls_automation_log_isolation ON keyvoro.automation_log
                    USING (automation_id IN (SELECT id FROM keyvoro.automation WHERE account_id = current_setting('app.current_account_id', true)::uuid))
                    WITH CHECK (automation_id IN (SELECT id FROM keyvoro.automation WHERE account_id = current_setting('app.current_account_id', true)::uuid));
            </sql>
        </changeSet>
    
    </databaseChangeLog>
  013-document-tables.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!-- ── Changeset 1: Document Category Table ──────────────── -->
        <changeSet id="013-01-create-document-category" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><tableExists tableName="document_category" schemaName="keyvoro"/></not>
            </preConditions>
    
            <createTable tableName="document_category" schemaName="keyvoro">
                <column name="id" type="uuid">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="uuid">
                    <constraints nullable="false"/>
                </column>
                <column name="name" type="varchar(100)">
                    <constraints nullable="false"/>
                </column>
                <column name="type" type="varchar(50)">
                    <constraints nullable="false"/>
                </column>
                <column name="description" type="text"/>
                <column name="required_for_loan_types" type="jsonb"/>
                <column name="display_order" type="int" defaultValueNumeric="0"/>
                <column name="is_default" type="int" defaultValueNumeric="0"/>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
            </createTable>
    
            <addForeignKeyConstraint
                baseTableSchemaName="keyvoro"
                baseTableName="document_category"
                baseColumnNames="account_id"
                constraintName="fk_document_category_account"
                referencedTableSchemaName="keyvoro"
                referencedTableName="account"
                referencedColumnNames="id"
                onDelete="CASCADE"/>
    
            <createIndex tableName="document_category" schemaName="keyvoro" indexName="idx_document_category_account">
                <column name="account_id"/>
            </createIndex>
        </changeSet>
    
        <changeSet id="013-01-create-document-category-defaults" author="claude">
            <comment>Set defaults for columns on document_category</comment>
            <addDefaultValue schemaName="keyvoro" tableName="document_category" columnName="id" defaultValueComputed="gen_random_uuid()"/>
            <addDefaultValue schemaName="keyvoro" tableName="document_category" columnName="created_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <!-- ── Changeset 2: Loan Document Table ──────────────────── -->
        <changeSet id="013-02-create-loan-document" author="keyvoro">
            <preConditions onFail="MARK_RAN">
                <not><tableExists tableName="loan_document" schemaName="keyvoro"/></not>
            </preConditions>
    
            <createTable tableName="loan_document" schemaName="keyvoro">
                <column name="id" type="uuid">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="loan_id" type="uuid">
                    <constraints nullable="false"/>
                </column>
                <column name="account_id" type="uuid">
                    <constraints nullable="false"/>
                </column>
                <column name="category_id" type="uuid"/>
                <column name="name" type="varchar(255)">
                    <constraints nullable="false"/>
                </column>
                <column name="description" type="text"/>
                <column name="file_key" type="varchar(500)"/>
                <column name="file_size" type="int"/>
                <column name="mime_type" type="varchar(100)"/>
                <column name="file_hash" type="varchar(64)"/>
                <column name="status" type="varchar(20)" defaultValue="pending">
                    <constraints nullable="false"/>
                </column>
                <column name="reviewed_by_id" type="uuid"/>
                <column name="reviewed_at" type="timestamptz"/>
                <column name="review_notes" type="text"/>
                <column name="uploaded_by_id" type="uuid"/>
                <column name="uploaded_at" type="timestamptz"/>
                <column name="expires_at" type="timestamptz"/>
                <column name="metadata" type="jsonb"/>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="013-02-create-loan-document-defaults" author="claude">
            <comment>Set defaults for columns on loan_document</comment>
            <addDefaultValue schemaName="keyvoro" tableName="loan_document" columnName="id" defaultValueComputed="gen_random_uuid()"/>
            <addDefaultValue schemaName="keyvoro" tableName="loan_document" columnName="uploaded_at" defaultValueComputed="now()"/>
            <addDefaultValue schemaName="keyvoro" tableName="loan_document" columnName="created_at" defaultValueComputed="now()"/>
            <addDefaultValue schemaName="keyvoro" tableName="loan_document" columnName="updated_at" defaultValueComputed="now()"/>
        </changeSet>
    
        <!-- ── Changeset 3: Loan Document Foreign Keys ───────────── -->
