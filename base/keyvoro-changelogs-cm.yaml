            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!-- 008: Integrations and Audit Tables -->
    
        <!-- 008-01: Create integration table -->
        <changeSet id="008-01" author="keyvoro">
            <createTable tableName="integration" remarks="External integrations (Slack, Zapier, etc.) per account">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_integration_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="provider" type="VARCHAR(100)">
                    <constraints nullable="false" checkConstraint="provider IN ('slack', 'zapier', 'make', 'n8n', 'custom')"/>
                </column>
                <column name="status" type="VARCHAR(50)" defaultValue="active">
                    <constraints nullable="false" checkConstraint="status IN ('active', 'inactive', 'disabled', 'error')"/>
                </column>
                <column name="config" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="last_sync_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="008-01-defaults" author="claude">
            <comment>Set defaults for columns on integration</comment>
            <addDefaultValue schemaName="keyvoro" tableName="integration" columnName="created_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
            <addDefaultValue schemaName="keyvoro" tableName="integration" columnName="updated_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
        </changeSet>
    
        <!-- 008-02: Create webhook table -->
        <changeSet id="008-02" author="keyvoro">
            <createTable tableName="webhook" remarks="Webhooks for integration events per account">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_webhook_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="integration_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_webhook_integration" referencedTableName="integration" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="url" type="TEXT">
                    <constraints nullable="false"/>
                </column>
                <column name="events" type="TEXT[]">
                    <constraints nullable="false"/>
                </column>
                <column name="secret" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="is_active" type="BOOLEAN" defaultValueBoolean="true">
                    <constraints nullable="false"/>
                </column>
                <column name="last_triggered_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="failure_count" type="INTEGER" defaultValueNumeric="0">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="008-02-defaults" author="claude">
            <comment>Set defaults for columns on webhook</comment>
            <addDefaultValue schemaName="keyvoro" tableName="webhook" columnName="created_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
            <addDefaultValue schemaName="keyvoro" tableName="webhook" columnName="updated_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
        </changeSet>
    
        <!-- 008-03: Create audit_log table -->
        <changeSet id="008-03" author="keyvoro">
            <createTable tableName="audit_log" remarks="Audit trail of all account actions">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_audit_log_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="user_id" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="entity_type" type="VARCHAR(100)">
                    <constraints nullable="false"/>
                </column>
                <column name="entity_id" type="UUID">
                    <constraints nullable="false"/>
                </column>
                <column name="action" type="VARCHAR(50)">
                    <constraints nullable="false" checkConstraint="action IN ('create', 'read', 'update', 'delete', 'export')"/>
                </column>
                <column name="changes" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="ip_address" type="INET">
                    <constraints nullable="true"/>
                </column>
                <column name="user_agent" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="008-03-defaults" author="claude">
            <comment>Set defaults for columns on audit_log</comment>
            <addDefaultValue schemaName="keyvoro" tableName="audit_log" columnName="created_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
        </changeSet>
    
        <!-- 008-03b: Add SET NULL foreign key for audit_log.user_id -->
        <changeSet id="008-03b" author="keyvoro">
            <addForeignKeyConstraint constraintName="fk_audit_log_user"
                baseTableSchemaName="keyvoro" baseTableName="audit_log" baseColumnNames="user_id"
                referencedTableSchemaName="keyvoro" referencedTableName="users" referencedColumnNames="id"
                onDelete="SET NULL"/>
        </changeSet>
    
        <!-- 008-04: Create api_key table -->
        <changeSet id="008-04" author="keyvoro">
            <createTable tableName="api_key" remarks="API keys for programmatic access per account">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_api_key_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="created_by" type="UUID">
                    <constraints nullable="true"/>
                </column>
                <column name="name" type="VARCHAR(255)">
                    <constraints nullable="false"/>
                </column>
                <column name="key_hash" type="VARCHAR(255)">
                    <constraints nullable="false" unique="true"/>
                </column>
                <column name="key_prefix" type="VARCHAR(10)">
                    <constraints nullable="false"/>
                </column>
                <column name="scopes" type="TEXT[]">
                    <constraints nullable="false"/>
                </column>
                <column name="last_used_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="expires_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="is_active" type="BOOLEAN" defaultValueBoolean="true">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="008-04-defaults" author="claude">
            <comment>Set defaults for columns on api_key</comment>
            <addDefaultValue schemaName="keyvoro" tableName="api_key" columnName="created_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
            <addDefaultValue schemaName="keyvoro" tableName="api_key" columnName="updated_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
        </changeSet>
    
        <!-- 008-04b: Add SET NULL foreign key for api_key.created_by -->
        <changeSet id="008-04b" author="keyvoro">
            <addForeignKeyConstraint constraintName="fk_api_key_user"
                baseTableSchemaName="keyvoro" baseTableName="api_key" baseColumnNames="created_by"
                referencedTableSchemaName="keyvoro" referencedTableName="users" referencedColumnNames="id"
                onDelete="SET NULL"/>
        </changeSet>
    
        <!-- 008-05: Create zapier_integration table -->
        <changeSet id="008-05" author="keyvoro">
            <createTable tableName="zapier_integration" remarks="Zapier-specific integration settings and credentials per account">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_zapier_integration_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="integration_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_zapier_integration_integration" referencedTableName="integration" referencedColumnNames="id" deleteCascade="true" unique="true"/>
                </column>
                <column name="auth_credentials" type="JSONB">
                    <constraints nullable="false"/>
                </column>
                <column name="last_sync_at" type="TIMESTAMPTZ">
                    <constraints nullable="true"/>
                </column>
                <column name="sync_status" type="VARCHAR(50)" defaultValue="idle">
                    <constraints nullable="false" checkConstraint="sync_status IN ('idle', 'syncing', 'completed', 'failed')"/>
                </column>
                <column name="error_message" type="TEXT">
                    <constraints nullable="true"/>
                </column>
                <column name="metadata" type="JSONB">
                    <constraints nullable="true"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="008-05-defaults" author="claude">
            <comment>Set defaults for columns on zapier_integration</comment>
            <addDefaultValue schemaName="keyvoro" tableName="zapier_integration" columnName="created_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
            <addDefaultValue schemaName="keyvoro" tableName="zapier_integration" columnName="updated_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
        </changeSet>
    
        <!-- 008-06: Create ai_analysis table -->
        <changeSet id="008-06" author="keyvoro">
            <createTable tableName="ai_analysis" remarks="AI analysis results for entities per account">
                <column name="id" type="UUID">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="UUID">
                    <constraints nullable="false" foreignKeyName="fk_ai_analysis_account" referencedTableName="account" referencedColumnNames="id" deleteCascade="true"/>
                </column>
                <column name="entity_type" type="VARCHAR(100)">
                    <constraints nullable="false"/>
                </column>
                <column name="entity_id" type="UUID">
                    <constraints nullable="false"/>
                </column>
                <column name="analysis_type" type="VARCHAR(100)">
                    <constraints nullable="false" checkConstraint="analysis_type IN ('summary', 'sentiment', 'classification', 'extraction', 'recommendation')"/>
                </column>
                <column name="results" type="JSONB">
                    <constraints nullable="false"/>
                </column>
                <column name="confidence_score" type="NUMERIC(3,2)">
                    <constraints nullable="false" checkConstraint="confidence_score >= 0.0 AND confidence_score &lt;= 1.0"/>
                </column>
                <column name="processed_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="TIMESTAMPTZ">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="008-06-defaults" author="claude">
            <comment>Set defaults for columns on ai_analysis</comment>
            <addDefaultValue schemaName="keyvoro" tableName="ai_analysis" columnName="processed_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
            <addDefaultValue schemaName="keyvoro" tableName="ai_analysis" columnName="created_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
            <addDefaultValue schemaName="keyvoro" tableName="ai_analysis" columnName="updated_at" defaultValueComputed="CURRENT_TIMESTAMP"/>
        </changeSet>
    
        <!-- 008-07: Enable RLS on integration table -->
        <changeSet id="008-07" author="keyvoro">
            <sql>ALTER TABLE keyvoro.integration ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
    
        <!-- 008-08: RLS Policy: integration - account isolation -->
        <changeSet id="008-08" author="keyvoro">
            <sql>
                CREATE POLICY integration_account_isolation ON keyvoro.integration
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 008-09: Enable RLS on webhook table -->
        <changeSet id="008-09" author="keyvoro">
            <sql>ALTER TABLE keyvoro.webhook ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
    
        <!-- 008-10: RLS Policy: webhook - account isolation -->
        <changeSet id="008-10" author="keyvoro">
            <sql>
                CREATE POLICY webhook_account_isolation ON keyvoro.webhook
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 008-11: Enable RLS on audit_log table -->
        <changeSet id="008-11" author="keyvoro">
            <sql>ALTER TABLE keyvoro.audit_log ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
    
        <!-- 008-12: RLS Policy: audit_log - account isolation -->
        <changeSet id="008-12" author="keyvoro">
            <sql>
                CREATE POLICY audit_log_account_isolation ON keyvoro.audit_log
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 008-13: Enable RLS on api_key table -->
        <changeSet id="008-13" author="keyvoro">
            <sql>ALTER TABLE keyvoro.api_key ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
    
        <!-- 008-14: RLS Policy: api_key - account isolation -->
        <changeSet id="008-14" author="keyvoro">
            <sql>
                CREATE POLICY api_key_account_isolation ON keyvoro.api_key
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 008-15: Enable RLS on zapier_integration table -->
        <changeSet id="008-15" author="keyvoro">
            <sql>ALTER TABLE keyvoro.zapier_integration ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
    
        <!-- 008-16: RLS Policy: zapier_integration - account isolation -->
        <changeSet id="008-16" author="keyvoro">
            <sql>
                CREATE POLICY zapier_integration_account_isolation ON keyvoro.zapier_integration
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 008-17: Enable RLS on ai_analysis table -->
        <changeSet id="008-17" author="keyvoro">
            <sql>ALTER TABLE keyvoro.ai_analysis ENABLE ROW LEVEL SECURITY</sql>
        </changeSet>
    
        <!-- 008-18: RLS Policy: ai_analysis - account isolation -->
        <changeSet id="008-18" author="keyvoro">
            <sql>
                CREATE POLICY ai_analysis_account_isolation ON keyvoro.ai_analysis
                FOR ALL
                USING (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
                WITH CHECK (account_id = CURRENT_SETTING('app.current_account_id', true)::uuid)
            </sql>
        </changeSet>
    
        <!-- 008-19: Index on integration (account_id, status) -->
        <changeSet id="008-19" author="keyvoro">
            <createIndex tableName="integration" indexName="idx_integration_account_status">
                <column name="account_id"/>
                <column name="status"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-20: Index on integration (account_id, provider) -->
        <changeSet id="008-20" author="keyvoro">
            <createIndex tableName="integration" indexName="idx_integration_account_provider">
                <column name="account_id"/>
                <column name="provider"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-21: Index on webhook (account_id, is_active) -->
        <changeSet id="008-21" author="keyvoro">
            <createIndex tableName="webhook" indexName="idx_webhook_account_active">
                <column name="account_id"/>
                <column name="is_active"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-22: Index on webhook (integration_id) -->
        <changeSet id="008-22" author="keyvoro">
            <createIndex tableName="webhook" indexName="idx_webhook_integration">
                <column name="integration_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-23: Index on audit_log (account_id, created_at) -->
        <changeSet id="008-23" author="keyvoro">
            <createIndex tableName="audit_log" indexName="idx_audit_log_account_created">
                <column name="account_id"/>
                <column name="created_at" descending="true"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-24: Index on audit_log (entity_type, entity_id) -->
        <changeSet id="008-24" author="keyvoro">
            <createIndex tableName="audit_log" indexName="idx_audit_log_entity">
                <column name="entity_type"/>
                <column name="entity_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-25: Index on audit_log (user_id) -->
        <changeSet id="008-25" author="keyvoro">
            <createIndex tableName="audit_log" indexName="idx_audit_log_user">
                <column name="user_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-26: Index on api_key (account_id, is_active) -->
        <changeSet id="008-26" author="keyvoro">
            <createIndex tableName="api_key" indexName="idx_api_key_account_active">
                <column name="account_id"/>
                <column name="is_active"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-27: Index on api_key (created_by) -->
        <changeSet id="008-27" author="keyvoro">
            <createIndex tableName="api_key" indexName="idx_api_key_created_by">
                <column name="created_by"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-28: Index on zapier_integration (account_id) -->
        <changeSet id="008-28" author="keyvoro">
            <createIndex tableName="zapier_integration" indexName="idx_zapier_integration_account">
                <column name="account_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-29: Index on ai_analysis (account_id, entity_type, entity_id) -->
        <changeSet id="008-29" author="keyvoro">
            <createIndex tableName="ai_analysis" indexName="idx_ai_analysis_account_entity">
                <column name="account_id"/>
                <column name="entity_type"/>
                <column name="entity_id"/>
            </createIndex>
        </changeSet>
    
        <!-- 008-30: Index on ai_analysis (account_id, analysis_type) -->
        <changeSet id="008-30" author="keyvoro">
            <createIndex tableName="ai_analysis" indexName="idx_ai_analysis_account_type">
                <column name="account_id"/>
                <column name="analysis_type"/>
            </createIndex>
        </changeSet>
    
    </databaseChangeLog>
  009-better-auth-tables.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-latest.xsd">
    
        <!-- Better Auth core tables for authentication -->
        <!-- These tables are managed by Better Auth's Drizzle adapter -->
    
        <changeSet id="009-01" author="cesar">
            <comment>Create Better Auth user table</comment>
            <createTable schemaName="keyvoro" tableName="auth_user">
                <column name="id" type="text">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="name" type="text">
                    <constraints nullable="false"/>
                </column>
                <column name="email" type="text">
                    <constraints nullable="false" unique="true"/>
                </column>
                <column name="email_verified" type="boolean" defaultValueBoolean="false">
                    <constraints nullable="false"/>
                </column>
                <column name="image" type="text"/>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="009-01-defaults" author="claude">
            <comment>Set defaults for timestamp columns on auth_user table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="auth_user" columnName="created_at" defaultValueComputed="NOW()"/>
            <addDefaultValue schemaName="keyvoro" tableName="auth_user" columnName="updated_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="009-02" author="cesar">
            <comment>Create Better Auth session table</comment>
            <createTable schemaName="keyvoro" tableName="auth_session">
                <column name="id" type="text">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="expires_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="token" type="text">
                    <constraints nullable="false" unique="true"/>
                </column>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="ip_address" type="text"/>
                <column name="user_agent" type="text"/>
                <column name="user_id" type="text">
                    <constraints nullable="false"
                                 foreignKeyName="fk_auth_session_user"
                                 references="keyvoro.auth_user(id)"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="009-02-defaults" author="claude">
            <comment>Set defaults for timestamp columns on auth_session table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="auth_session" columnName="created_at" defaultValueComputed="NOW()"/>
            <addDefaultValue schemaName="keyvoro" tableName="auth_session" columnName="updated_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="009-03" author="cesar">
            <comment>Create Better Auth account table (OAuth linked accounts)</comment>
            <createTable schemaName="keyvoro" tableName="auth_account">
                <column name="id" type="text">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="account_id" type="text">
                    <constraints nullable="false"/>
                </column>
                <column name="provider_id" type="text">
                    <constraints nullable="false"/>
                </column>
                <column name="user_id" type="text">
                    <constraints nullable="false"
                                 foreignKeyName="fk_auth_account_user"
                                 references="keyvoro.auth_user(id)"/>
                </column>
                <column name="access_token" type="text"/>
                <column name="refresh_token" type="text"/>
                <column name="id_token" type="text"/>
                <column name="access_token_expires_at" type="timestamptz"/>
                <column name="refresh_token_expires_at" type="timestamptz"/>
                <column name="scope" type="text"/>
                <column name="password" type="text"/>
                <column name="created_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
                <column name="updated_at" type="timestamptz">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>
    
        <changeSet id="009-03-defaults" author="claude">
            <comment>Set defaults for timestamp columns on auth_account table</comment>
            <addDefaultValue schemaName="keyvoro" tableName="auth_account" columnName="created_at" defaultValueComputed="NOW()"/>
            <addDefaultValue schemaName="keyvoro" tableName="auth_account" columnName="updated_at" defaultValueComputed="NOW()"/>
        </changeSet>
    
        <changeSet id="009-04" author="cesar">
