# Vault Secrets Operator — Keyvoro
# Syncs secrets from HashiCorp Vault to Kubernetes Secrets.
#
# DB credentials use VaultDynamicSecret → database/static-creds/app_keyvoro
# which auto-syncs when Vault rotates the password (every 24h).
# Non-DB secrets (Redis, GHCR, app) use VaultStaticSecret → KV.
#
# Prerequisites:
#   1. Vault Secrets Operator installed (vault-system namespace)
#   2. Vault role "keyvoro-vso" with policies: keyvoro-secrets, database-app_keyvoro
#   3. ServiceAccount "keyvoro-vso" in keyvoro namespace
#   4. Vault database static role app_keyvoro configured

---
# VaultConnection — points to Vault server
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: keyvoro
spec:
  address: https://vault.aps.kim
  skipTLSVerify: true

---
# ServiceAccount for VSO authentication
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keyvoro-vso
  namespace: keyvoro
  labels:
    app: keyvoro
    app.kubernetes.io/component: secret-sync

---
# VaultAuth — authenticates to Vault via Kubernetes SA
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: keyvoro-auth
  namespace: keyvoro
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: vault-connection
  kubernetes:
    role: keyvoro-vso
    serviceAccount: keyvoro-vso
    tokenExpirationSeconds: 600

---
# Database credentials from Vault database secrets engine (auto-rotating)
# Vault rotates app_keyvoro password every 24h. VSO polls every 30m and
# triggers a rollout restart when the password changes.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: keyvoro-db-credentials
  namespace: keyvoro
spec:
  mount: database
  path: static-creds/app_keyvoro
  refreshAfter: 30m
  renewalPercent: 67
  rolloutRestartTargets:
    - kind: Deployment
      name: keyvoro
  vaultAuthRef: keyvoro-auth
  destination:
    create: true
    name: keyvoro-db
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        url:
          text: "postgresql://app_keyvoro:{{ .Secrets.password }}@db01.aps.kim:6432/postgres?search_path=keyvoro"
        url-direct:
          text: "postgresql://app_keyvoro:{{ .Secrets.password }}@db01.aps.kim:5432/postgres?search_path=keyvoro"
        password:
          text: "{{ .Secrets.password }}"

---
# Infrastructure credentials (Redis, Qdrant) from KV — not rotated by database engine
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keyvoro-infra-credentials
  namespace: keyvoro
spec:
  vaultAuthRef: keyvoro-auth
  mount: secret
  type: kv-v2
  path: infra/db-stack
  refreshAfter: 1h
  destination:
    create: true
    name: keyvoro-infra
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        redis-url:
          text: "redis://:{{ .Secrets.redis_password }}@db01.aps.kim:6379"
        qdrant-url:
          text: "http://db01.aps.kim:6333"

---
# GHCR pull secret (for pulling container images)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ghcr-pull-secret
  namespace: keyvoro
spec:
  vaultAuthRef: keyvoro-auth
  mount: secret
  type: kv-v2
  path: devops/github/ghcr
  refreshAfter: 1h
  destination:
    create: true
    name: ghcr-pull-secret
    overwrite: true
    type: kubernetes.io/dockerconfigjson
    transformation:
      excludeRaw: true
      templates:
        .dockerconfigjson:
          text: '{"auths":{"ghcr.io":{"auth":"{{ .Secrets.auth }}"}}}'

---
# App-specific secrets (Better Auth, etc.)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keyvoro-app-secrets
  namespace: keyvoro
spec:
  vaultAuthRef: keyvoro-auth
  mount: secret
  type: kv-v2
  path: apps/keyvoro
  refreshAfter: 1h
  destination:
    create: true
    name: keyvoro-auth
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        better-auth-secret:
          text: "{{ .Secrets.better_auth_secret }}"
        keycloak-client-id:
          text: "{{ .Secrets.keycloak_client_id }}"
        keycloak-client-secret:
          text: "{{ .Secrets.keycloak_client_secret }}"
