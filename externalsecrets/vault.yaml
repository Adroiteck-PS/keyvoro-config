# Vault Secrets Operator — Keyvoro
# Syncs secrets from HashiCorp Vault to Kubernetes Secrets.
#
# Prerequisites:
#   1. Vault Secrets Operator installed (vault-system namespace)
#   2. VaultConnection "vault-connection" in keyvoro namespace
#   3. Vault role "keyvoro-vso" with policy to read secret/infra/db-stack and secret/apps/keyvoro
#   4. ServiceAccount "keyvoro-vso" in keyvoro namespace
#   5. Vault paths populated:
#        vault kv patch secret/infra/db-stack app_keyvoro_password=<generated>
#        vault kv put secret/apps/keyvoro better_auth_secret=<generated>
#
# Pattern matches: atlas, android-fleet, nautilus-trader

---
# VaultConnection — points to Vault server
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: keyvoro
spec:
  address: https://vault.aps.kim
  skipTLSVerify: true

---
# ServiceAccount for VSO authentication
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keyvoro-vso
  namespace: keyvoro
  labels:
    app: keyvoro
    app.kubernetes.io/component: secret-sync

---
# VaultAuth — authenticates to Vault via Kubernetes SA
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: keyvoro-auth
  namespace: keyvoro
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: vault-connection
  kubernetes:
    role: keyvoro-vso
    serviceAccount: keyvoro-vso
    tokenExpirationSeconds: 600

---
# Database credentials from infra/db-stack
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keyvoro-db-credentials
  namespace: keyvoro
spec:
  vaultAuthRef: keyvoro-auth
  mount: secret
  type: kv-v2
  path: infra/db-stack
  refreshAfter: 1h
  destination:
    create: true
    name: keyvoro-db
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        url:
          text: "postgresql://app_keyvoro:{{ .Secrets.app_keyvoro_password }}@db01.aps.kim:6432/postgres?search_path=keyvoro"
        url-direct:
          text: "postgresql://app_keyvoro:{{ .Secrets.app_keyvoro_password }}@db01.aps.kim:5432/postgres?search_path=keyvoro"
        password:
          text: "{{ .Secrets.app_keyvoro_password }}"
        redis-url:
          text: "redis://:{{ .Secrets.redis_password }}@db01.aps.kim:6379"
        qdrant-url:
          text: "http://db01.aps.kim:6333"

---
# GHCR pull secret (for pulling container images)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ghcr-pull-secret
  namespace: keyvoro
spec:
  vaultAuthRef: keyvoro-auth
  mount: secret
  type: kv-v2
  path: devops/github/ghcr
  refreshAfter: 1h
  destination:
    create: true
    name: ghcr-pull-secret
    overwrite: true
    type: kubernetes.io/dockerconfigjson
    transformation:
      excludeRaw: true
      templates:
        .dockerconfigjson:
          text: '{"auths":{"ghcr.io":{"auth":"{{ .Secrets.auth }}"}}}'

---
# App-specific secrets (Better Auth, etc.)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: keyvoro-app-secrets
  namespace: keyvoro
spec:
  vaultAuthRef: keyvoro-auth
  mount: secret
  type: kv-v2
  path: apps/keyvoro
  refreshAfter: 1h
  destination:
    create: true
    name: keyvoro-auth
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        better-auth-secret:
          text: "{{ .Secrets.better_auth_secret }}"
        keycloak-client-id:
          text: "{{ .Secrets.keycloak_client_id }}"
        keycloak-client-secret:
          text: "{{ .Secrets.keycloak_client_secret }}"
