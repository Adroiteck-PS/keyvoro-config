apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keyvoro

resources:
  - ../../base
  - ../../externalsecrets/vault.yaml

# Production-specific patches
patches:
  - target:
      kind: Deployment
      name: keyvoro
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
