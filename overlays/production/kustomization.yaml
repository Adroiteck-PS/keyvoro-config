apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keyvoro

resources:
  - ../../base
  - ../../externalsecrets/vault.yaml

# Image tag — updated automatically by CI after each build
images:
  - name: ghcr.io/adroiteck-ps/keyvoro
    newTag: main  # CI replaces this with git-<sha7> after each successful build

# Production-specific patches
patches:
  - target:
      kind: Deployment
      name: keyvoro
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
