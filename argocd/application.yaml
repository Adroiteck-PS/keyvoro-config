# ArgoCD Application — Keyvoro
# Apply this once to the cluster: kubectl apply -f argocd/application.yaml -n argocd
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keyvoro
  namespace: argocd
  labels:
    app.kubernetes.io/name: keyvoro
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Adroiteck-PS/keyvoro-config.git
    targetRevision: main
    path: overlays/production
    kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: keyvoro

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences that OKD mutates post-apply
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
        - /status
